<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B0E11">
<title>Koç · Sağlık Paneli</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22Ko%C3%A7%22,%22short_name%22:%22Ko%C3%A7%22,%22display%22:%22standalone%22,%22background_color%22:%22%230B0E11%22,%22theme_color%22:%22%230B0E11%22,%22icons%22:[]}">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --bg:#0B0E11; --bg2:#13181D; --card:#161C22; --card2:#1C242B;
  --line:#222B33; --line2:#2C3740;
  --txt:#E8EDF1; --txt2:#8B97A3; --txt3:#5A6570;
  --green:#2BD89A; --green-d:#1D9E75; --green-bg:rgba(43,216,154,.12);
  --blue:#4DA8FF; --amber:#F5B544; --coral:#FF7A59; --red:#FF5C5C;
  --radius:18px; --radius-sm:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg); color:var(--txt);
  min-height:100vh; overflow-x:hidden;
  background-image:radial-gradient(circle at 50% 0%, rgba(43,216,154,.06), transparent 60%);
}
.wrap{max-width:780px; margin:0 auto; padding:20px 16px 100px; position:relative}

/* HEADER */
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.brand{display:flex;align-items:center;gap:10px}
.brand-dot{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--green),var(--green-d));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#04120C}
.brand-name{font-size:17px;font-weight:700;letter-spacing:-.3px}
.brand-name span{color:var(--green)}
.head-greet{font-size:12px;color:var(--txt2);margin-top:1px}

/* DATE STRIP */
.datestrip{display:flex;align-items:center;gap:8px;margin-bottom:20px;position:relative}
.dnav{width:38px;height:38px;border-radius:11px;background:var(--card);border:1px solid var(--line);color:var(--txt2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;transition:.18s;user-select:none}
.dnav:active{transform:scale(.92);background:var(--card2)}
.dcenter{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:9px 16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:.18s}
.dcenter:active{transform:scale(.98)}
.dcenter-day{font-size:15px;font-weight:700;letter-spacing:-.2px}
.dcenter-sub{font-size:11px;color:var(--txt2)}
.ddots{display:flex;gap:4px}
.ddot{width:6px;height:6px;border-radius:50%}

/* CALENDAR POPUP */
.calwrap{position:absolute;top:46px;left:46px;right:46px;z-index:50;background:var(--card2);border:1px solid var(--line2);border-radius:var(--radius);padding:16px;opacity:0;transform:translateY(-8px) scale(.97);pointer-events:none;transition:.22s cubic-bezier(.2,.8,.2,1)}
.calwrap.open{opacity:1;transform:none;pointer-events:auto}
.calhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.caltitle{font-size:14px;font-weight:700}
.calnav{display:flex;gap:6px}
.calnav button{width:30px;height:30px;border-radius:9px;background:var(--card);border:1px solid var(--line);color:var(--txt2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.caldow{font-size:10px;color:var(--txt3);text-align:center;padding:4px 0;font-weight:600}
.calday{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;transition:.14s;position:relative;font-size:13px;font-weight:600}
.calday:active{transform:scale(.9)}
.calday.has{background:var(--card)}
.calday.sel{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.calday.today::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--green)}
.calday.other{opacity:.28}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 16px;border-radius:12px;background:var(--card);border:1px solid var(--line);color:var(--txt2);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.18s;flex-shrink:0;display:flex;align-items:center;gap:6px}
.tab.on{background:var(--green);border-color:var(--green);color:#04120C}
.tab svg{width:15px;height:15px}

/* PAGES */
.page{display:none;animation:slideup .35s cubic-bezier(.2,.8,.2,1)}
.page.on{display:block}
@keyframes slideup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* HERO METRIC */
.hero{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40%;right:-10%;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,var(--green-bg),transparent 70%)}
.hero-label{font-size:12px;color:var(--txt2);margin-bottom:6px;position:relative}
.hero-val{font-size:46px;font-weight:800;letter-spacing:-2px;line-height:1;position:relative}
.hero-unit{font-size:18px;color:var(--txt2);font-weight:600}
.hero-delta{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;margin-top:10px;padding:4px 10px;border-radius:8px;position:relative}
.hero-delta.down{background:var(--green-bg);color:var(--green)}
.hero-delta.up{background:rgba(255,92,92,.12);color:var(--red)}

/* STAT GRID */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px}
.stat-label{font-size:11px;color:var(--txt2);margin-bottom:5px}
.stat-val{font-size:21px;font-weight:700;letter-spacing:-.5px}
.stat-val .u{font-size:12px;color:var(--txt2);font-weight:500}
.stat-val.green{color:var(--green)}.stat-val.amber{color:var(--amber)}

/* CARD */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.ctitle{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:16px;display:flex;align-items:center;gap:8px;letter-spacing:-.2px}
.ctitle svg{width:16px;height:16px;color:var(--green)}

/* RINGS (macro) */
.rings{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.ring-item{display:flex;flex-direction:column;align-items:center;gap:8px}
.ring{position:relative;width:62px;height:62px}
.ring svg{transform:rotate(-90deg)}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.ring-name{font-size:11px;color:var(--txt2)}
.ring-val{font-size:12px;font-weight:600;color:var(--txt)}

/* YORUM */
.yorum{border-radius:var(--radius-sm);padding:14px 16px;font-size:13px;line-height:1.65;border-left:3px solid var(--amber);background:rgba(245,181,68,.08);color:#F5D89B}

/* CHART */
.chart-wrap{position:relative;width:100%;height:230px}

/* OGUN */
.ogun{background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;transition:.18s}
.ogun:active{transform:scale(.99)}
.ohead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.oname{font-size:14px;font-weight:700}
.okcal{font-size:13px;color:var(--green);font-weight:700}
.omacro{display:flex;gap:8px;margin-bottom:8px}
.opill{font-size:11px;padding:3px 9px;border-radius:7px;background:var(--card2);color:var(--txt2);font-weight:600}
.ofood{font-size:12px;color:var(--txt2);line-height:1.5}
.supp-ozet{display:flex;flex-wrap:wrap;gap:7px}
.supp-tag{background:var(--green-bg);color:var(--green);font-size:12px;font-weight:600;padding:5px 11px;border-radius:8px}
/* ŞİFRE KAPISI */
.kilit{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px}
.kilit-box{width:100%;max-width:320px;text-align:center}
.kilit-logo{width:64px;height:64px;border-radius:18px;background:var(--green);color:#04120C;font-size:32px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.kilit-baslik{font-size:28px;font-weight:800;margin-bottom:6px}
.kilit-baslik span{color:var(--green)}
.kilit-alt{font-size:13px;color:var(--txt2);margin-bottom:24px}
.kilit-input{width:100%;background:var(--card);border:1px solid var(--line2);border-radius:13px;padding:15px;color:var(--txt);font-size:18px;text-align:center;letter-spacing:4px;font-family:inherit;margin-bottom:12px;box-sizing:border-box}
.kilit-input:focus{border-color:var(--green);outline:none}
.kilit-btn{width:100%;background:var(--green);color:#04120C;border:none;border-radius:13px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.kilit-btn:active{transform:scale(.98)}
.kilit-hata{color:var(--red);font-size:13px;margin-top:12px;min-height:18px}
.ogun-tik{cursor:pointer;transition:.12s}
.ogun-tik:active{transform:scale(.99)}
.ogun-ok{color:var(--txt3);font-size:12px}
.besin-liste{margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.besin-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 0;font-size:12px}
.besin-row:not(:last-child){border-bottom:1px solid var(--line)}
.besin-ad{color:var(--txt);font-weight:500;flex:1;min-width:0}
.besin-mak{color:var(--txt2);white-space:nowrap;font-size:11px}
.besin-kcal{color:var(--amber);font-weight:600}

/* ANT */
.exr{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--line)}
.exr:last-child{border:none}
.exr-name{font-size:14px;font-weight:600}
.exr-badge{font-size:12px;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:5px 11px;color:var(--txt2);font-weight:600}
.kard{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.kard:last-child{border:none}
.kard-ic{width:38px;height:38px;border-radius:11px;background:var(--green-bg);display:flex;align-items:center;justify-content:center;color:var(--green);flex-shrink:0}
.kard-ic svg{width:19px;height:19px}
.kard-name{font-size:14px;font-weight:600;flex:1}
.kard-meta{font-size:12px;color:var(--txt2)}

/* SUPP */
.supps{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.supp{display:flex;align-items:center;gap:11px;padding:13px 14px;background:var(--bg2);border:1px solid var(--line);border-radius:13px;cursor:pointer;transition:.16s}
.supp:active{transform:scale(.97)}
.supp.on{background:var(--green-bg);border-color:var(--green)}
.scheck{width:22px;height:22px;border-radius:7px;border:2px solid var(--line2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.16s}
.supp.on .scheck{background:var(--green);border-color:var(--green)}
.scheck svg{width:13px;height:13px;color:#04120C;opacity:0;transition:.16s}
.supp.on .scheck svg{opacity:1}
.sname{font-size:13px;font-weight:600}

/* LAB */
.labsum{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.labgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.labitem{background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:13px}
.labname{font-size:11px;color:var(--txt2);margin-bottom:5px}
.labval{font-size:18px;font-weight:700;letter-spacing:-.5px}
.labval.ok{color:var(--green)}.labval.lo{color:var(--amber)}.labval.hi{color:var(--red)}
.labref{font-size:10px;color:var(--txt3);margin-top:3px}

/* LOADING + EMPTY */
.loading{text-align:center;padding:50px 20px;color:var(--txt2);font-size:14px}
.spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--green);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--txt3);font-size:14px}
.empty svg{width:38px;height:38px;margin-bottom:10px;opacity:.4}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 230px);min-height:420px}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:4px 2px 16px;scrollbar-width:thin}
.msg{max-width:82%;padding:12px 15px;border-radius:16px;font-size:14px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word;animation:msgin .3s cubic-bezier(.2,.8,.2,1)}
@keyframes msgin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;background:var(--green);color:#04120C;border-bottom-right-radius:5px;font-weight:500}
.msg.koc{align-self:flex-start;background:var(--card);border:1px solid var(--line);color:var(--txt);border-bottom-left-radius:5px}
.msg.typing{align-self:flex-start;background:var(--card);border:1px solid var(--line);border-bottom-left-radius:5px;display:flex;gap:5px;padding:15px}
.msg.typing span{width:7px;height:7px;border-radius:50%;background:var(--txt3);animation:blink 1.2s infinite}
.msg.typing span:nth-child(2){animation-delay:.2s}
.msg.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
.chat-welcome{text-align:center;padding:30px 16px;color:var(--txt2)}
.chat-welcome-ic{width:48px;height:48px;border-radius:14px;background:var(--green-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--green)}
.chat-welcome-ic svg{width:24px;height:24px}
.chat-welcome h3{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:6px}
.chat-welcome p{font-size:13px;line-height:1.5}
.chat-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
.chip{padding:8px 13px;border-radius:11px;background:var(--card);border:1px solid var(--line);color:var(--txt2);font-size:12px;cursor:pointer;transition:.15s}
.chip:active{transform:scale(.96)}
.chip:hover{border-color:var(--green);color:var(--txt)}
.chat-input{display:flex;gap:9px;align-items:flex-end;padding-top:12px;border-top:1px solid var(--line)}
.chat-input textarea{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px;color:var(--txt);font-size:14px;font-family:inherit;resize:none;max-height:120px;line-height:1.4;outline:none;transition:.15s}
.chat-input textarea:focus{border-color:var(--green)}
.chat-send{width:44px;height:44px;border-radius:13px;background:var(--green);border:none;color:#04120C;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.chat-send:active{transform:scale(.92)}
.chat-send:disabled{opacity:.4;cursor:not-allowed}
.chat-send svg{width:19px;height:19px}
.chat-foto{width:44px;height:44px;border-radius:13px;background:var(--card);border:1px solid var(--line);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.chat-foto:active{transform:scale(.92)}
.chat-foto svg{width:20px;height:20px}

/* ANTRENMAN DEFTERİ */
.agrp{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden}
.agrph{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;transition:.15s}
.agrph.on{background:var(--green-bg)}
.agrpn{font-size:15px;font-weight:700;display:flex;align-items:center;gap:9px}
.agrpn svg{color:var(--green);width:18px;height:18px}
.agrpc{font-size:12px;color:var(--txt2);display:flex;align-items:center;gap:6px}
.aexs{display:none;padding:0 12px 10px}
.aexs.open{display:block}
.aex{padding:12px 8px;border-top:1px solid var(--line)}
.aexn{font-size:13px;font-weight:600;margin-bottom:9px}
.asets{display:flex;gap:8px;align-items:flex-end}
.asetbox{flex:1;display:flex;flex-direction:column;gap:4px}
.asetbox label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.3px}
.asetbox input{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:10px;color:var(--txt);font-size:15px;font-weight:600;text-align:center;width:100%;font-family:inherit}
.asetbox input:focus{border-color:var(--green);outline:none}
.asetbox input.dolu{border-color:var(--green-d)}
.asaveb{width:100%;background:var(--green);color:#04120C;border:none;border-radius:var(--radius-sm);padding:15px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.asaveb:active{transform:scale(.98)}
.asaveb:disabled{opacity:.5}
.asaveb svg{width:18px;height:18px}
.atip-input{width:100%;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;color:var(--txt);font-size:14px;font-family:inherit;margin-bottom:12px}
.atip-input:focus{border-color:var(--green);outline:none}
.ant-ust{display:flex;gap:8px;align-items:stretch;margin-bottom:12px}
.ant-duzen-btn{flex-shrink:0;background:var(--card);border:1px solid var(--line);color:var(--txt2);border-radius:var(--radius-sm);padding:0 16px;font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
.ant-duzen-btn.on{background:var(--green);color:#04120C;border-color:var(--green)}
.ant-duzen-btn:active{transform:scale(.95)}
.aex-duzen{display:flex;align-items:center;justify-content:space-between;padding:12px 8px;border-top:1px solid var(--line)}
.hareket-sil{background:rgba(255,92,92,.12);border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:14px}
.hareket-sil:active{transform:scale(.92)}
.hareket-ekle{width:100%;background:var(--green-bg);border:1px dashed var(--green-d);color:var(--green);border-radius:10px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}
.hareket-ekle:active{transform:scale(.98)}
.grup-ekle{width:100%;background:var(--card);border:1px dashed var(--line2);color:var(--txt);border-radius:var(--radius-sm);padding:14px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px}
.grup-ekle:active{transform:scale(.98)}

/* KALORİ BÜTÇE GRAFİĞİ */
.kb-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px}
.kb-big{font-size:34px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.kb-slash{font-size:16px;color:var(--txt2);font-weight:600;letter-spacing:0}
.kb-pct{font-size:14px;font-weight:700;padding:5px 12px;border-radius:10px}
.kb-track{position:relative;height:16px;background:var(--bg);border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.kb-fill{position:absolute;left:0;top:0;height:100%;border-radius:10px;transition:width .7s cubic-bezier(.2,.8,.2,1)}
.kb-over{position:absolute;right:0;top:0;height:100%;background:repeating-linear-gradient(45deg,var(--red),var(--red) 6px,#c44 6px,#c44 12px);opacity:.9;border-radius:0 10px 10px 0;transition:width .7s cubic-bezier(.2,.8,.2,1)}
.kb-scale{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--txt3)}
.kb-durum{margin-top:14px;padding:13px 15px;border-radius:12px;border-left:3px solid}
.kb-durum-t{font-size:13px;font-weight:700;margin-bottom:4px}
.kb-durum-m{font-size:12.5px;line-height:1.55;color:var(--txt2)}
.kb-budget{display:flex;justify-content:space-between;margin-top:14px;gap:10px}
.kb-budget-item{flex:1;text-align:center;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px 6px}
.kb-budget-v{font-size:20px;font-weight:800;letter-spacing:-.5px}
.kb-budget-l{font-size:10px;color:var(--txt2);margin-top:3px}

/* TAHLİL SEKMESİ */

const GRUP_SIRA = ['Göğüs','Triceps','Sırt','Biceps','Omuz','Bacak'];

// Supabase'deki hareketlerden kas gruplarını dinamik oluştur
function kasGruplari(){
  if(!cache.hareketler.length) return KAS_GRUPLARI; // henüz yüklenmediyse varsayılan
  const gruplar = {};
  cache.hareketler.forEach(h=>{
    (gruplar[h.kas_grubu] = gruplar[h.kas_grubu] || []).push(h);
  });
  // Sıralama: bilinen gruplar önce (GRUP_SIRA), sonra yeni eklenenler
  const adlar = Object.keys(gruplar);
  adlar.sort((a,b)=>{
    let ia = GRUP_SIRA.indexOf(a), ib = GRUP_SIRA.indexOf(b);
    if(ia<0) ia=999; if(ib<0) ib=999;
    return ia-ib || a.localeCompare(b);
  });
  return adlar.map(ad=>({
    ad,
    hareketler: gruplar[ad].sort((x,y)=>(x.sira||0)-(y.sira||0)).map(h=>h.hareket)
  }));
}

// Belirli bir güne ait kalori hedefini bul (o güne kadar olan en son hedef)
function gununHedefi(ds){
  const uygun = cache.hedefler
    .filter(h => h.baslangic_tarih <= ds)
    .sort((a,b)=> {
      // önce tarihe göre (yeni tarih önce), aynı tarihte id'ye göre (büyük id = en son eklenen)
      const t = b.baslangic_tarih.localeCompare(a.baslangic_tarih);
      if(t !== 0) return t;
      return (b.id||0) - (a.id||0);
    });
  return uygun.length ? uygun[0].kalori : 1800; // varsayılan 1800
}

function totals(ds){
  const og = cache.ogun[ds]||[];
  return {
    kalori: og.reduce((s,o)=>s+(o.kcal||0),0),
    protein: og.reduce((s,o)=>s+(o.protein||0),0),
    karb: og.reduce((s,o)=>s+(o.karb||0),0),
    yag: og.reduce((s,o)=>s+(o.yag||0),0),
  };
}

let ozetMod = 'gun'; // gun | hafta | ay
let donemSporAcik = false; // hafta/ay özetinde spor günleri listesi açık mı
let donemSeciliGun = null; // açılan spor gününün tarihi
let donemKaloriAcik = false; // kalori günleri listesi açık mı
let donemSeciliKaloriGun = null; // açılan kalori gününün tarihi

// Pazartesi-Pazar haftasının baş/bitiş tarihleri (seçili güne göre)
function haftaAraligi(ds){
  const d = new Date(ds);
  let gun = d.getDay(); gun = gun===0?7:gun; // Pazartesi=1, Pazar=7
  const bas = new Date(d); bas.setDate(d.getDate()-(gun-1));
  const bit = new Date(bas); bit.setDate(bas.getDate()+6);
  return { bas: bas.toISOString().slice(0,10), bit: bit.toISOString().slice(0,10) };
}
function ayAraligi(ds){
  const [y,m] = ds.split('-');
  const bas = `${y}-${m}-01`;
  const son = new Date(+y, +m, 0).getDate();
  const bit = `${y}-${m}-${String(son).padStart(2,'0')}`;
  return { bas, bit };
}

// ISO hafta numarası (yılın kaçıncı haftası)
function haftaNo(ds){
  const d = new Date(ds); d.setHours(0,0,0,0);
  d.setDate(d.getDate()+4-(d.getDay()||7));
  const yilBasi = new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-yilBasi)/86400000)+1)/7);
}

// Bir tarih aralığındaki tüm verileri topla/ortala
function donemOzeti(bas, bit){
  const gunler = [];
  let d = new Date(bas), son = new Date(bit);
  while(d<=son){ gunler.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }

  let topKcal=0, topP=0, topK=0, topY=0, kaloriliGun=0, sporGun=0;
  let enYuksek=null, enDusuk=null; // {tarih, kcal}
  const sporGunleri = [];
  const kaloriGunleri = [];
  gunler.forEach(g=>{
    const t = totals(g);
    if(t.kalori>0){
      topKcal+=t.kalori; topP+=t.protein; topK+=t.karb; topY+=t.yag; kaloriliGun++;
      kaloriGunleri.push({tarih:g, kcal:t.kalori});
      if(!enYuksek || t.kalori>enYuksek.kcal) enYuksek={tarih:g, kcal:t.kalori};
      if(!enDusuk || t.kalori<enDusuk.kcal) enDusuk={tarih:g, kcal:t.kalori};
    }
    const a = cache.ant[g];
    if(a && Array.isArray(a.egzersizler) && a.egzersizler.length){ sporGun++; sporGunleri.push(g); }
  });

  // Kilo değişimi: dönemdeki ilk ve son ölçüm
  const olcumler = gunler.map(g=>cache.olcum[g]).filter(o=>o&&o.kilo);
  let kiloDeg=null, ilkKilo=null, sonKilo=null;
  if(olcumler.length>=1){
    ilkKilo = olcumler[0].kilo;
    sonKilo = olcumler[olcumler.length-1].kilo;
    if(olcumler.length>=2) kiloDeg = Math.round((sonKilo-ilkKilo)*10)/10;
  }

  return {
    gunSayisi: gunler.length,
    kaloriliGun, sporGun,
    ortKcal: kaloriliGun?Math.round(topKcal/kaloriliGun):0,
    ortP: kaloriliGun?Math.round(topP/kaloriliGun):0,
    ortK: kaloriliGun?Math.round(topK/kaloriliGun):0,
    ortY: kaloriliGun?Math.round(topY/kaloriliGun):0,
    kiloDeg, ilkKilo, sonKilo,
    enYuksek, enDusuk, sporGunleri, kaloriGunleri,
  };
}

function viewOzet(){
  // Gün/Hafta/Ay geçiş çubuğu (her modda üstte)
  const modBar = `<div class="ozet-mod">
    <div class="ozet-mod-btn ${ozetMod==='gun'?'on':''}" data-mod="gun">Gün</div>
    <div class="ozet-mod-btn ${ozetMod==='hafta'?'on':''}" data-mod="hafta">Hafta</div>
    <div class="ozet-mod-btn ${ozetMod==='ay'?'on':''}" data-mod="ay">Ay</div>
  </div>`;

  if(ozetMod==='hafta' || ozetMod==='ay'){
    return `<div class="page on">${modBar}${viewDonem(ozetMod)}</div>`;
  }

  // ---- GÜN MODU (mevcut görünüm) ----
  const o = cache.olcum[selDate];
  const t = totals(selDate);
  const a = cache.ant[selDate];
  const antVar = a && Array.isArray(a.egzersizler) && a.egzersizler.length;
  const trend = cache.kiloTrend;
  const sonOlcum = o || (trend.length ? trend[trend.length-1] : null);
  const olcumGuncel = !!o;
  const hedefKcal = gununHedefi(selDate);

  let delta = 0;
  if(o && trend.length>1){
    const idx = trend.findIndex(r=>r.tarih===selDate);
    if(idx>0) delta = Math.round((o.kilo - trend[idx-1].kilo)*10)/10;
  }
  const macros = [
    ['Protein',t.protein,HEDEF.protein,'var(--green)'],
    ['Karb',t.karb,HEDEF.karb,'var(--blue)'],
    ['Yağ',t.yag,HEDEF.yag,'var(--amber)'],
    ['Kalori',t.kalori,hedefKcal,'var(--coral)'],
  ];

  // Kalori bütçesi mini-gösterge
  const alinan = t.kalori;
  const kalan = hedefKcal - alinan;
  const yuzde = Math.round(alinan/hedefKcal*100);
  let bRenk = 'var(--blue)';
  if(yuzde>=70 && yuzde<=100) bRenk='var(--green)';
  else if(yuzde>100 && yuzde<=115) bRenk='var(--amber)';
  else if(yuzde>115) bRenk='var(--red)';

  return `<div class="page on">
    ${modBar}
    ${sonOlcum ? `<div class="hero">
      <div class="hero-label">${olcumGuncel?'Ağırlık':'Son ölçüm'} ${olcumGuncel?'':`· ${fmtDay(sonOlcum.tarih)}`}</div>
      <div class="hero-val">${sonOlcum.kilo}<span class="hero-unit"> kg</span></div>
      ${olcumGuncel&&delta!==0?`<div class="hero-delta ${delta<0?'down':'up'}">${delta<0?'↓':'↑'} ${Math.abs(delta)} kg · önceki ölçüm</div>`:''}
    </div>`:''}

    <div class="card">
      <div class="ctitle">${I.chart} Kalori <span style="margin-left:auto;font-size:11px;color:var(--txt2);font-weight:500">${alinan} / ${hedefKcal} kcal</span></div>
      <div class="kb-track"><div class="kb-fill" style="width:${Math.min(100,yuzde)}%;background:${bRenk}"></div>${yuzde>100?`<div class="kb-over" style="width:${Math.min(100,yuzde-100)}%"></div>`:''}</div>
      <div class="kb-budget">
        <div class="kb-budget-item"><div class="kb-budget-v" style="color:${bRenk}">${alinan}</div><div class="kb-budget-l">Tüketim</div></div>
        <div class="kb-budget-item"><div class="kb-budget-v" style="color:${kalan>=0?'var(--green)':'var(--red)'}">${kalan>=0?kalan:'+'+Math.abs(kalan)}</div><div class="kb-budget-l">Kalan</div></div>
        <div class="kb-budget-item"><div class="kb-budget-v">%${yuzde}</div><div class="kb-budget-l"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="ctitle">${I.chart} Makro durumu</div>
      <div class="rings">
        ${macros.map(([n,v,m,c])=>{const pct=Math.min(100,Math.round(v/m*100));return `<div class="ring-item"><div class="ring">${ring(pct,c)}<div class="ring-pct" style="color:${c};font-size:12px">${v}</div></div><div class="ring-name">${n}</div></div>`;}).join('')}
      </div>
    </div>
    ${trend.length>1?`<div class="card"><div class="ctitle">${I.chart} Kilo trendi</div><div class="chart-wrap"><canvas id="kiloChart"></canvas></div></div>`:''}
    ${sonOlcum&&sonOlcum.kas_kg?`<div class="stats"><div class="stat"><div class="stat-label">Kas kütlesi</div><div class="stat-val">${sonOlcum.kas_kg}<span class="u">kg</span></div></div><div class="stat"><div class="stat-label">Su oranı</div><div class="stat-val">%${sonOlcum.su_orani||'—'}</div></div><div class="stat"><div class="stat-label">Yağ oranı</div><div class="stat-val">%${sonOlcum.yag_orani||'—'}</div></div></div>`:''}
    ${ozetAntrenman()}
    ${ozetOgunler()}
    ${ozetSupplement()}
  </div>`;
}

function ozetSupplement(){
  const rec = cache.supp[selDate];
  const alinanlar = rec && Array.isArray(rec.alinanlar) ? rec.alinanlar : [];
  if(!alinanlar.length) return '';
  return `<div class="card"><div class="ctitle">${I.pill} Supplementler <span style="margin-left:auto;font-size:11px;color:var(--txt2);font-weight:500">${alinanlar.length} alındı</span></div>
    <div class="supp-ozet">${alinanlar.map(s=>`<span class="supp-tag">${s}</span>`).join('')}</div>
  </div>`;
}

function ozetAntrenman(){
  const a = cache.ant[selDate];
  if(!a || !Array.isArray(a.egzersizler) || !a.egzersizler.length) return '';
  const egz = a.egzersizler;
  return `<div class="card">
    <div class="ctitle">${I.dumbbell} Antrenman <span style="margin-left:auto;font-size:11px;color:var(--txt2);font-weight:500">${a.tip||''} · ${egz.length} hareket</span></div>
    ${egz.map(e=>{
      const detay = e.detay || [e.kg!=null?e.kg+' kg':'', (e.set!=null||e.tekrar!=null)?`${e.set||''}×${e.tekrar||''}`:''].filter(Boolean).join(' · ');
      return `<div class="exr"><div class="exr-name">${e.ad||''}</div><div class="exr-badge">${detay||'—'}</div></div>`;
    }).join('')}
    ${Array.isArray(a.kardiyo)&&a.kardiyo.length?a.kardiyo.map(k=>`<div class="exr"><div class="exr-name">${I.run} ${k.ad||'Kardiyo'}</div><div class="exr-badge">${k.sure?k.sure+' dk':''}${k.kcal?' · '+k.kcal+' kcal':''}</div></div>`).join(''):''}
  </div>`;
}

function ozetOgunler(){
  const og = cache.ogun[selDate]||[];
  if(!og.length) return '';
  const t = totals(selDate);
  return `<div class="card">
    <div class="ctitle">${I.food} Öğünler <span style="margin-left:auto;font-size:11px;color:var(--txt2);font-weight:500">${og.length} öğün · ${t.kalori} kcal</span></div>
    ${og.map(o=>`<div class="osog-row" style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)">
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${o.ogun||'Öğün'}</div>${o.yiyecekler?`<div style="font-size:11px;color:var(--txt2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.yiyecekler}</div>`:''}</div>
      <div style="font-size:13px;color:var(--green);font-weight:700;margin-left:10px;flex-shrink:0">${o.kcal||0} kcal</div>
    </div>`).join('')}
  </div>`;
}

function bindOzet(){
  document.querySelectorAll('.ozet-mod-btn').forEach(el=>{
    el.onclick = ()=>{ ozetMod = el.dataset.mod; donemSporAcik=false; donemSeciliGun=null; donemKaloriAcik=false; donemSeciliKaloriGun=null; render(); };
  });
  // Spor Günü kartına tıkla → listeyi aç/kapa
  const sg = document.getElementById('sporGunStat');
  if(sg) sg.onclick = ()=>{ donemSporAcik = !donemSporAcik; donemSeciliGun=null; render(); };
  // Spor günü satırına tıkla → detay aç/kapa
  document.querySelectorAll('.spor-gun-head:not(.kalori-gun-head)').forEach(el=>{
    el.onclick = ()=>{
      const g = el.dataset.gun;
      donemSeciliGun = (donemSeciliGun===g) ? null : g;
      render();
    };
  });
  // Ort. Kalori kartına tıkla → listeyi aç/kapa
  const kg = document.getElementById('kaloriGunStat');
  if(kg) kg.onclick = ()=>{ donemKaloriAcik = !donemKaloriAcik; donemSeciliKaloriGun=null; render(); };
  // Kalori günü satırına tıkla → öğün detayı aç/kapa
  document.querySelectorAll('.kalori-gun-head').forEach(el=>{
    el.onclick = ()=>{
      const g = el.dataset.gun;
      donemSeciliKaloriGun = (donemSeciliKaloriGun===g) ? null : g;
      render();
    };
  });
}

  const o = donemOzeti(aralik.bas, aralik.bit);
  const baslik = mod==='hafta' ? 'Bu Hafta' : 'Bu Ay';
  const altBaslik = mod==='hafta'
    ? `${haftaNo(selDate)}. hafta · ${fmtDay(aralik.bas)} – ${fmtDay(aralik.bit)}`
    : `${fmtDay(aralik.bas)} – ${fmtDay(aralik.bit)}`;

  if(o.kaloriliGun===0 && o.sporGun===0 && o.kiloDeg===null){
    return `<div class="empty" style="padding:40px 20px">${I.empty}<div>${baslik.toLowerCase()} için henüz veri yok.</div></div>`;

  // Kilo değişimi kartı
  let kiloKart = '';
  if(o.kiloDeg!==null){
    const dustu = o.kiloDeg<0;
    kiloKart = `<div class="hero">
      <div class="hero-label">${baslik} kilo değişimi</div>
      <div class="hero-val" style="color:${dustu?'var(--green)':o.kiloDeg>0?'var(--red)':'var(--txt)'}">${o.kiloDeg>0?'+':''}${o.kiloDeg}<span class="hero-unit"> kg</span></div>
      <div class="hero-delta ${dustu?'down':'up'}">${o.ilkKilo} → ${o.sonKilo} kg</div>
    </div>`;
  } else if(o.sonKilo!==null){
    kiloKart = `<div class="hero">
      <div class="hero-label">${baslik} · tek ölçüm</div>
      <div class="hero-val">${o.sonKilo}<span class="hero-unit"> kg</span></div>
      <div class="hero-delta" style="background:var(--card2);color:var(--txt2)">Değişim için 2+ ölçüm gerekli</div>
    </div>`;
  }

  return `${kiloKart}
    <div class="card" style="text-align:center">
      <div class="ctitle" style="justify-content:center">${I.chart} ${baslik} Özeti</div>
      <div style="font-size:11px;color:var(--txt3);margin-top:-8px;margin-bottom:16px">${altBaslik}</div>
      <div class="stats" style="margin-bottom:12px">
        <div class="stat kalori-gun-stat ${donemKaloriAcik?'aktif':''}" id="kaloriGunStat"><div class="stat-label">Ort. Kalori</div><div class="stat-val amber">${o.ortKcal} ${o.kaloriliGun>0?'▾':''}</div></div>
        <div class="stat spor-gun-stat ${donemSporAcik?'aktif':''}" id="sporGunStat"><div class="stat-label">Spor Günü</div><div class="stat-val green">${o.sporGun} ${o.sporGun>0?'▾':''}</div></div>
        <div class="stat"><div class="stat-label">Kayıtlı Gün</div><div class="stat-val">${o.kaloriliGun}/${o.gunSayisi}</div></div>
      </div>
      <div class="stats" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat"><div class="stat-label">Ort. Protein</div><div class="stat-val green">${o.ortP}<span class="u">g</span></div></div>
        <div class="stat"><div class="stat-label">Ort. Karb</div><div class="stat-val">${o.ortK}<span class="u">g</span></div></div>
        <div class="stat"><div class="stat-label">Ort. Yağ</div><div class="stat-val amber">${o.ortY}<span class="u">g</span></div></div>
      </div>
    </div>
    ${donemKaloriAcik && o.kaloriGunleri.length ? `<div class="card">
      <div class="ctitle">${I.food} Günlük Kaloriler</div>
      ${o.kaloriGunleri.map(kg=>{
        const g = kg.tarih;
        const og = cache.ogun[g]||[];
        const acik = donemSeciliKaloriGun===g;
        return `<div class="spor-gun-row">
          <div class="spor-gun-head kalori-gun-head" data-gun="${g}">
            <div><div style="font-size:13px;font-weight:600">${fmtDay(g)} · ${DAYNAMES[new Date(g).getDay()]}</div><div style="font-size:11px;color:var(--txt2)">${og.length} öğün</div></div>
            <div style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;color:var(--amber);font-weight:700">${kg.kcal} kcal</span><span style="color:var(--txt3)">${acik?'▾':'▸'}</span></div>
          </div>
          ${acik?`<div class="spor-gun-detay">
            ${og.map((o2,i)=>ogunKart(o2, 'ozet-'+selDate+'-'+i)).join('')}
          </div>`:''}
        </div>`;
      }).join('')}
    </div>`:''}
    ${donemSporAcik && o.sporGunleri.length ? `<div class="card">
      <div class="ctitle">${I.dumbbell} Spor Günleri</div>
      ${o.sporGunleri.map(g=>{
        const a = cache.ant[g];
        const acik = donemSeciliGun===g;
        const egz = (a&&a.egzersizler)||[];
        return `<div class="spor-gun-row">
          <div class="spor-gun-head" data-gun="${g}">
            <div><div style="font-size:13px;font-weight:600">${fmtDay(g)} · ${DAYNAMES[new Date(g).getDay()]}</div><div style="font-size:11px;color:var(--txt2)">${a.tip||'Antrenman'} · ${egz.length} hareket</div></div>
            <span style="color:var(--txt3)">${acik?'▾':'▸'}</span>
          </div>
          ${acik?`<div class="spor-gun-detay">
            ${egz.map(e=>{
              const detay = e.detay || [e.kg!=null?e.kg+' kg':'',(e.set!=null||e.tekrar!=null)?`${e.set||''}×${e.tekrar||''}`:''].filter(Boolean).join(' · ');
              return `<div class="exr"><div class="exr-name">${e.ad||''}</div><div class="exr-badge">${detay||'—'}</div></div>`;
            }).join('')}
            ${Array.isArray(a.kardiyo)&&a.kardiyo.length?a.kardiyo.map(k=>`<div class="exr"><div class="exr-name">${I.run} ${k.ad||'Kardiyo'}</div><div class="exr-badge">${k.sure?k.sure+' dk':''}${k.kcal?' · '+k.kcal+' kcal':''}</div></div>`).join(''):''}
          </div>`:''}
        </div>`;
      }).join('')}
    </div>`:''}
    ${(o.enYuksek||o.enDusuk)?`<div class="card">
      <div class="ctitle">${I.chart} Kalori uçları</div>
      ${o.enYuksek?`<div class="exr"><div class="exr-name">🔺 En kalorili gün</div><div class="exr-badge">${fmtDay(o.enYuksek.tarih)} · ${o.enYuksek.kcal} kcal</div></div>`:''}
      ${o.enDusuk?`<div class="exr"><div class="exr-name">🔻 En az kalorili gün</div><div class="exr-badge">${fmtDay(o.enDusuk.tarih)} · ${o.enDusuk.kcal} kcal</div></div>`:''}
    </div>`:''}
    <div class="yorum" style="margin-top:0">${donemYorum(mod,o)}</div>`;
}

function donemYorum(mod, o){
  const sure = mod==='hafta'?'hafta':'ay';
  const parts = [];
  if(o.ortKcal>0) parts.push(`Bu ${sure} günlük ortalama ${o.ortKcal} kcal aldın`);
  if(o.sporGun>0) parts.push(`${o.sporGun} gün spor yaptın`);
  else parts.push('hiç antrenman kaydın yok');
  if(o.kiloDeg!==null){
    if(o.kiloDeg<0) parts.push(`${Math.abs(o.kiloDeg)} kg verdin 💪`);
    else if(o.kiloDeg>0) parts.push(`${o.kiloDeg} kg aldın`);
    else parts.push('kilon sabit kaldı');
  }
  return parts.join(', ') + '.';
}

function drawKilo(){
  const el = document.getElementById('kiloChart');
  if(!el) return;
  if(kiloChart) kiloChart.destroy();
  const data = cache.kiloTrend;
  const vals = data.map(r=>r.kilo);
  const mn = Math.floor(Math.min(...vals)-1), mx = Math.ceil(Math.max(...vals)+1.2);

  // Her noktanın üstüne kg yazan küçük eklenti
  const etiketPlugin = {
    id:'kgEtiket',
    afterDatasetsDraw(chart){
      const {ctx} = chart;
      const meta = chart.getDatasetMeta(0);
      ctx.save();
      ctx.font='600 11px -apple-system,sans-serif';
      ctx.fillStyle='#E8EDF1';
      ctx.textAlign='center';
      meta.data.forEach((pt,i)=>{
        ctx.fillText(vals[i], pt.x, pt.y-12);
      });
      ctx.restore();
    }
  };

  kiloChart = new Chart(el,{
    type:'line',
    data:{ labels:data.map(r=>{const[,m,d]=r.tarih.split('-');return d+'/'+m;}),
      datasets:[{data:vals,borderColor:'#2BD89A',borderWidth:2.5,tension:.4,fill:true,
        backgroundColor:(c)=>{const g=c.chart.ctx.createLinearGradient(0,0,0,230);g.addColorStop(0,'rgba(43,216,154,.25)');g.addColorStop(1,'rgba(43,216,154,0)');return g;},
        pointBackgroundColor:'#2BD89A',pointBorderColor:'#0B0E11',pointBorderWidth:2,pointRadius:5,pointHoverRadius:7}]},
    options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:18}},
      plugins:{legend:{display:false},tooltip:{enabled:false}},
      scales:{y:{min:mn,max:mx,ticks:{color:'#5A6570',font:{size:11},callback:v=>v+' kg'},grid:{color:'rgba(255,255,255,.04)'}},x:{ticks:{color:'#5A6570',font:{size:11}},grid:{display:false}}}},
    plugins:[etiketPlugin]
  });
}

// Açık öğün kartlarını takip et (besin detayı açık mı)
let acikOgunler = {};
function ogunKart(o, key){
  const besinler = Array.isArray(o.besinler) ? o.besinler : null;
  const acik = !!acikOgunler[key];
  const tiklanabilir = besinler && besinler.length;
  return `<div class="ogun${tiklanabilir?' ogun-tik':''}" ${tiklanabilir?`data-ogun-key="${key}"`:''}>
    <div class="ohead"><div class="oname">${o.ogun||'Öğün'}${tiklanabilir?` <span class="ogun-ok">${acik?'▾':'▸'}</span>`:''}</div><div class="okcal">${o.kcal||0} kcal</div></div>
    <div class="omacro"><span class="opill">P ${o.protein||0}g</span><span class="opill">K ${o.karb||0}g</span><span class="opill">Y ${o.yag||0}g</span></div>
    ${o.yiyecekler?`<div class="ofood">${o.yiyecekler}</div>`:''}
    ${tiklanabilir && acik ? `<div class="besin-liste">
      ${besinler.map(b=>`<div class="besin-row">
        <span class="besin-ad">${b.ad||''}</span>
        <span class="besin-mak"><span class="besin-kcal">${b.kcal||0} kcal</span> · P${b.protein||0} K${b.karb||0} Y${b.yag||0}</span>
      </div>`).join('')}
    </div>`:''}
  </div>`;
}
function bindOgunKartlari(){
  document.querySelectorAll('.ogun-tik').forEach(el=>{
    el.onclick = ()=>{
      const k = el.dataset.ogunKey;
      acikOgunler[k] = !acikOgunler[k];
      render();
    };
  });
}

function viewBesl(){
  const og = cache.ogun[selDate]||[];
  const t = totals(selDate);
  if(!og.length) return `<div class="page on"><div class="empty">${I.empty}<div>Bu gün öğün kaydı yok.</div></div></div>`;

  const hedef = gununHedefi(selDate);
  const alinan = t.kalori;
  const yuzde = Math.round(alinan/hedef*100);
  const kalan = hedef - alinan;
  const asim = alinan - hedef;

  // Durum analizi + renk
  let durumRenk, durumBaslik, durumMetin, barRenk;
  if(yuzde < 70){
    durumRenk='var(--blue)'; barRenk='var(--blue)';
    durumBaslik='Hedefin altındasın';
    durumMetin=`${kalan} kcal daha alabilirsin. Gün bitmeden öğünlerini tamamlamayı unutma.`;
  } else if(yuzde <= 100){
    durumRenk='var(--green)'; barRenk='var(--green)';
    durumBaslik='Harika gidiyorsun';
    durumMetin=kalan>0 ? `Hedefine çok yakınsın, ${kalan} kcal bütçen kaldı.` : `Tam hedefindesin! Mükemmel denge.`;
  } else if(yuzde <= 115){
    durumRenk='var(--amber)'; barRenk='var(--amber)';
    durumBaslik='Hedefi biraz aştın';
    durumMetin=`${asim} kcal fazla aldın. Yarın biraz daha dikkatli olabilir veya bugün hareket ekleyebilirsin.`;
  } else {
    durumRenk='var(--red)'; barRenk='var(--red)';
    durumBaslik='Hedefi belirgin aştın';
    durumMetin=`${asim} kcal fazladasın (%${yuzde-100} aşım). Akşam hafif tutmak veya kardiyo eklemek dengeyi toparlar.`;
  }

  const barDoluluk = Math.min(100, yuzde);
  const asimBar = yuzde>100 ? Math.min(100, yuzde-100) : 0;

  return `<div class="page on">
    <div class="card kalori-card">
      <div class="ctitle">${I.chart} Kalori</div>
      <div class="kb-head">
        <div class="kb-big" style="color:${durumRenk}">${alinan}<span class="kb-slash">/ ${hedef}</span></div>
        <div class="kb-pct" style="background:${durumRenk}1f;color:${durumRenk}">%${yuzde}</div>
      </div>
      <div class="kb-track">
        <div class="kb-fill" style="width:${barDoluluk}%;background:${barRenk}"></div>
        ${asimBar>0?`<div class="kb-over" style="width:${asimBar}%"></div>`:''}
      </div>
      <div class="kb-scale"><span>0</span><span>${Math.round(hedef/2)}</span><span>${hedef}</span></div>
      <div class="kb-durum" style="border-left-color:${durumRenk};background:${durumRenk}14">
        <div class="kb-durum-t" style="color:${durumRenk}">${durumBaslik}</div>
        <div class="kb-durum-m">${durumMetin}</div>
      </div>
    </div>

    <div class="stats" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat"><div class="stat-label">Kalori</div><div class="stat-val">${t.kalori}</div></div>
      <div class="stat"><div class="stat-label">Protein</div><div class="stat-val green">${t.protein}<span class="u">g</span></div></div>
      <div class="stat"><div class="stat-label">Karb</div><div class="stat-val">${t.karb}<span class="u">g</span></div></div>
      <div class="stat"><div class="stat-label">Yağ</div><div class="stat-val">${t.yag}<span class="u">g</span></div></div>

async function hareketEkle(grup){
  const ad = prompt(`"${grup}" grubuna eklenecek hareket adı:`);
  if(!ad || !ad.trim()) return;
  const enBuyukSira = Math.max(0, ...cache.hareketler.filter(h=>h.kas_grubu===grup).map(h=>h.sira||0));
  try{
    const { error } = await sb.from('hareketler').insert({ kas_grubu:grup, hareket:ad.trim(), sira:enBuyukSira+1 });
    if(error) throw error;
    await fetchData(); render();
  }catch(e){ alert('Eklenemedi: '+(e.message||e)); }
}

async function hareketSil(grup, hareket){
  if(!confirm(`"${hareket}" silinsin mi?`)) return;
  try{
    const { error } = await sb.from('hareketler').delete().eq('kas_grubu',grup).eq('hareket',hareket);
    if(error) throw error;

}

async function antKaydet(){
  const btn = document.getElementById('antSave');
  btn.disabled = true; btn.textContent = 'Kaydediliyor…';

  const tip = document.getElementById('antTip').value.trim() || 'Antrenman';
  const toplam = {};
  document.querySelectorAll('.asetbox input').forEach(inp=>{
    const h = inp.dataset.h, f = inp.dataset.f, v = inp.value.trim().replace(',','.');
    if(v==='') return;
    toplam[h] = toplam[h] || { ad:h };
    toplam[h][f] = f==='kg' ? parseFloat(v) : parseInt(v,10);
  });
  const egzersizler = Object.values(toplam).map(e=>{
    const parca = [];
    if(e.kg!=null && !isNaN(e.kg)) parca.push(e.kg+'kg');
    if(e.set!=null && !isNaN(e.set)) parca.push(e.set+'x'+(e.tekrar??''));
    else if(e.tekrar!=null && !isNaN(e.tekrar)) parca.push(e.tekrar+' tekrar');
    return { ad:e.ad, kg:e.kg, tekrar:e.tekrar, set:e.set, detay:parca.join(' · ') };
  });

  if(!egzersizler.length){
    btn.disabled=false; btn.innerHTML = `${I.save} Antrenmanı Kaydet`;
    alert('En az bir harekete değer gir.');
    return;
  }

  try{
    // upsert: aynı güne tek antrenman satırı
    const { error } = await sb.from('antrenmanlar')
      .upsert({ tarih:selDate, tip, egzersizler, kardiyo: (cache.ant[selDate]?.kardiyo)||[] }, { onConflict:'tarih' });
    if(error) throw error;
    await fetchData();
    btn.innerHTML = `${I.check} Kaydedildi!`;
    setTimeout(()=>{ render(); }, 700);
  }catch(e){
    btn.disabled=false; btn.innerHTML = `${I.save} Antrenmanı Kaydet`;
    alert('Kayıt hatası: '+(e.message||e));
  }
}

let seciliTahlilId = null; // seçili tahlil (yoksa en son)
let labFiltre = 'hepsi'; // hepsi | normal | dikkat

function viewLab(){
  if(!cache.lab.length) return `<div class="page on"><div class="empty">${I.empty}<div>Henüz tahlil kaydı yok.<br><span style="font-size:12px;opacity:.7">Koç sekmesinden 📷 ile tahlil PDF'i yükle.</span></div></div></div>`;

  if(seciliTahlilId){
    const bulunan = cache.lab.find(x=>String(x.id)===String(seciliTahlilId));
    if(bulunan) t = bulunan;
  }
  const deg = t.degerler||[];
  const dusuk = deg.filter(d=>(d.durum||'ok')==='lo').length;
  const yuksek = deg.filter(d=>(d.durum||'ok')==='hi').length;
  const normal = deg.length - dusuk - yuksek;
  const dikkat = dusuk + yuksek;

  // Filtreye göre gösterilecek değerler
  let gosterilen = deg;
  if(labFiltre==='normal') gosterilen = deg.filter(d=>(d.durum||'ok')==='ok');
  else if(labFiltre==='dikkat') gosterilen = deg.filter(d=>(d.durum||'ok')!=='ok');

  const secenekler = cache.lab.map(x=>`<option value="${x.id}" ${String(x.id)===String(t.id)?'selected':''}>${fmtDay(x.tarih)} ${x.tarih.split('-')[0]} · ${(x.degerler||[]).length} değer</option>`).join('');

  return `<div class="page on">
    <select class="lab-select" id="labSelect">${secenekler}</select>

    <div class="labsum">
      <div class="stat lab-filt ${labFiltre==='hepsi'?'aktif':''}" data-filt="hepsi"><div class="stat-label">Parametre</div><div class="stat-val">${deg.length}</div></div>
      <div class="stat lab-filt ${labFiltre==='normal'?'aktif':''}" data-filt="normal"><div class="stat-label">Normal</div><div class="stat-val green">${normal}</div></div>
      <div class="stat lab-filt ${labFiltre==='dikkat'?'aktif':''}" data-filt="dikkat"><div class="stat-label">Dikkat</div><div class="stat-val amber">${dikkat}</div></div>
    </div>

    <div class="card"><div class="ctitle">${I.lab} ${t.baslik||'Tahlil'} · ${fmtDay(t.tarih)}${labFiltre!=='hepsi'?` <span style="margin-left:auto;font-size:11px;color:var(--txt2);font-weight:500">${labFiltre==='dikkat'?'Sadece dikkat':'Sadece normal'} · ${gosterilen.length}</span>`:''}</div>
      <div class="lab-list">
        ${gosterilen.length ? gosterilen.map(d=>{
          const ad=d.ad||'', val=d.deger||'', ref=d.referans||'', dur=d.durum||'ok', onceki=d.onceki||'';
          const durEt = dur==='lo'?'Düşük':dur==='hi'?'Yüksek':'Normal';
          return `<div class="lab-row">
            <div class="lab-row-main">
              <div class="lab-row-ad">${ad}</div>
              <div class="lab-row-val ${dur}">${val} <span class="lab-row-dur ${dur}">${durEt}</span></div>
            </div>
            <div class="lab-row-sub">
              <span>Ref: ${ref||'—'}</span>
              ${onceki?`<span class="lab-row-onceki">Önceki: ${onceki}</span>`:''}
            </div>
          </div>`;
        }).join('') : `<div class="empty" style="padding:24px">${labFiltre==='dikkat'?'Dikkat gerektiren değer yok 🎉':'Bu filtrede değer yok.'}</div>`}
      </div>

  </div>`;

  if(sel) sel.onchange = ()=>{ seciliTahlilId = sel.value; labFiltre='hepsi'; render(); };

function escapeHtml(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function bindChat(){
  const input = document.getElementById('chatInput');

function scrollChat(){ const m=document.getElementById('chatMsgs'); if(m) m.scrollTop=m.scrollHeight; }

let bekleyenOnay = null; // görsel okuması sonrası onay bekleyen veri

// PDF tahlil: metni çıkar, Gemini'ye gönder
async function pdfGonder(file){
  chatGecmis.push({rol:'kullanici', metin:`📄 Tahlil PDF'i yüklendi: ${file.name}`});
  const msgs = document.getElementById('chatMsgs');
  msgs.innerHTML = chatGecmis.map(m=>`<div class="msg ${m.rol==='kullanici'?'user':'koc'}">${escapeHtml(m.metin)}</div>`).join('')
    + '<div class="msg typing" id="typing"><span></span><span></span><span></span></div>';
  scrollChat();

  let metin = '';
  try{
    const buf = await file.arrayBuffer();
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const pdf = await pdfjsLib.getDocument({data:buf}).promise;
    for(let i=1;i<=pdf.numPages;i++){
      const page = await pdf.getPage(i);
      const tc = await page.getTextContent();
      metin += tc.items.map(it=>it.str).join(' ') + '\n';
    }
  }catch(e){
    document.getElementById('fotoInput').value='';
    chatGecmis.push({rol:'koc', metin:'PDF okunamadı: '+e.message});
    document.getElementById('chatMsgs').innerHTML = chatGecmis.map(m=>`<div class="msg ${m.rol==='kullanici'?'user':'koc'}">${escapeHtml(m.metin)}</div>`).join('');
    scrollChat();
    return;
  }

  if(!metin.trim()){
    document.getElementById('fotoInput').value='';
    chatGecmis.push({rol:'koc', metin:'PDF\'ten metin çıkarılamadı (taranmış görüntü olabilir). Fotoğraf olarak deneyebilirsin.'});
    document.getElementById('chatMsgs').innerHTML = chatGecmis.map(m=>`<div class="msg ${m.rol==='kullanici'?'user':'koc'}">${escapeHtml(m.metin)}</div>`).join('');
    scrollChat();
    return;
  }

  try{
    const res = await fetch('/.netlify/functions/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ pdf_metin: metin, tarih: selDate }),
    });
    if(!res.ok) throw new Error('Sunucu '+res.status);
    const data = await res.json();
    chatGecmis.push({rol:'koc', metin:data.cevap||'Tahlil okunamadı.'});
    if(data.bekleyen) bekleyenOnay = data.bekleyen;
  }catch(e){
    chatGecmis.push({rol:'koc', metin:'Bağlantı hatası: '+e.message});
  }
  document.getElementById('fotoInput').value='';
  document.getElementById('chatMsgs').innerHTML = chatGecmis.map(m=>`<div class="msg ${m.rol==='kullanici'?'user':'koc'}">${escapeHtml(m.metin)}</div>`).join('');
  scrollChat();
}

async function fotoGonder(file){
  const tip = await fotoTipSec();
  if(!tip){ document.getElementById('fotoInput').value=''; return; }

  // Görseli küçült (büyük mobil fotoğraflar "load failed"e yol açıyor)
  let base64;
  try{
    base64 = await kucultGorsel(file, 1280, 0.8);
  }catch(e){
    // küçültme başarısızsa orijinali kullan
    base64 = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
  }

  chatGecmis.push({rol:'kullanici', metin:`📷 ${tip==='tahlil'?'Tahlil':'Tartı'} fotoğrafı yüklendi`});
  const msgs = document.getElementById('chatMsgs');
  msgs.innerHTML = chatGecmis.map(m=>`<div class="msg ${m.rol==='kullanici'?'user':'koc'}">${escapeHtml(m.metin)}</div>`).join('')
    + '<div class="msg typing" id="typing"><span></span><span></span><span></span></div>';
  scrollChat();

  try{
    const res = await fetch('/.netlify/functions/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ gorsel: base64, gorsel_tip: tip, tarih: selDate }),
    });
    if(!res.ok) throw new Error('Sunucu '+res.status);
    const data = await res.json();
    chatGecmis.push({rol:'koc', metin:data.cevap||'Görsel okunamadı.'});
    if(data.bekleyen) bekleyenOnay = data.bekleyen;
  }catch(e){
    chatGecmis.push({rol:'koc', metin:'Bağlantı hatası: '+e.message+'\n\nFotoğraf çok büyük olabilir, daha küçük/net bir görsel dene.'});
  }
  document.getElementById('fotoInput').value='';
  document.getElementById('chatMsgs').innerHTML = chatGecmis.map(m=>`<div class="msg ${m.rol==='kullanici'?'user':'koc'}">${escapeHtml(m.metin)}</div>`).join('');
  scrollChat();
}

// Görseli orantılı küçült, base64 (jpeg) döndür
function kucultGorsel(file, maxBoyut, kalite){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      let {width:w, height:h} = img;
      if(w>maxBoyut || h>maxBoyut){
        if(w>h){ h=Math.round(h*maxBoyut/w); w=maxBoyut; }
        else { w=Math.round(w*maxBoyut/h); h=maxBoyut; }
      }
      const c = document.createElement('canvas');
      c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg', kalite));
    };
    img.onerror = reject;
    img.src = url;
  });
}

      <div style="font-size:12px;color:var(--txt2);margin-bottom:16px">Fotoğraftaki veri türünü seç</div>
      <button id="ftTarti" style="width:100%;background:var(--green);color:#04120C;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px">⚖️ Tartı / Vücut Analizi</button>
      <button id="ftTahlil" style="width:100%;background:var(--card);color:var(--txt);border:1px solid var(--line);border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px">🩸 Kan Tahlili</button>
      <button id="ftIptal" style="width:100%;background:transparent;color:var(--txt2);border:none;border-radius:12px;padding:10px;font-size:13px;cursor:pointer">İptal</button>
    </div>`;
    document.body.appendChild(ov);
    ov.querySelector('#ftTarti').onclick=()=>{ov.remove();resolve('tarti');};
    ov.querySelector('#ftTahlil').onclick=()=>{ov.remove();resolve('tahlil');};
    ov.querySelector('#ftIptal').onclick=()=>{ov.remove();resolve(null);};
    ov.onclick=(e)=>{ if(e.target===ov){ov.remove();resolve(null);} };
  });
}

async function gonder(){
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSend');
  const text = input.value.trim();
  if(!text) return;

  chatGecmis.push({rol:'kullanici', metin:text});
  input.value=''; input.style.height='auto';
  sendBtn.disabled = true;

  const msgs = document.getElementById('chatMsgs');
  msgs.innerHTML = chatGecmis.map(m=>`<div class="msg ${m.rol==='kullanici'?'user':'koc'}">${escapeHtml(m.metin)}</div>`).join('')
    + '<div class="msg typing" id="typing"><span></span><span></span><span></span></div>';
  scrollChat();

  try{
    const res = await fetch('/.netlify/functions/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ mesaj:text, tarih: selDate, gecmis: chatGecmis.slice(0,-1), bekleyen: bekleyenOnay }),
    });
    const data = await res.json();
    let cevap;
    if(data.cevap){
      cevap = data.cevap;
      if(data.saved){ bekleyenOnay = null; await fetchData(); }
      else if(data.bekleyen){ bekleyenOnay = data.bekleyen; }
    } else {
      cevap = 'Hata detayı: ' + JSON.stringify(data.detay || data.error || data).slice(0, 500);
    }
    chatGecmis.push({rol:'koc', metin:cevap});
  }catch(e){
    chatGecmis.push({rol:'koc', metin:'Bağlantı hatası: '+e.message});
  }

  document.getElementById('chatMsgs').innerHTML = chatGecmis.map(m=>`<div class="msg ${m.rol==='kullanici'?'user':'koc'}">${escapeHtml(m.metin)}</div>`).join('');
  sendBtn.disabled = false;
  scrollChat();
}

// ===== ŞİFRE KAPISI =====
const KOC_SIFRE = "1791"; // şifreni buradan değiştir
const KILIT_GUN = 30; // kaç gün hatırlasın

function kilitAc(){
  document.getElementById('kilit').style.display = 'none';
  document.getElementById('wrap').style.display = '';
  loadAll();
}
function kilitDene(){
  const v = document.getElementById('kilitInput').value;
  if(v === KOC_SIFRE){
    try{ document.cookie = `koc_giris=1; max-age=${KILIT_GUN*86400}; path=/`; }catch(e){}
    kilitAc();
  } else {
    const h = document.getElementById('kilitHata');
    h.textContent = 'Yanlış şifre, tekrar dene.';
    document.getElementById('kilitInput').value = '';
    document.getElementById('kilitInput').focus();
  }
}
// Daha önce giriş yapılmış mı? (cookie)
if(document.cookie.split(';').some(c=>c.trim().startsWith('koc_giris=1'))){
  kilitAc();
} else {
  const ki = document.getElementById('kilitInput');
  const kb = document.getElementById('kilitBtn');
  if(kb) kb.onclick = kilitDene;
  if(ki){
    ki.addEventListener('keydown', e=>{ if(e.key==='Enter') kilitDene(); });
    setTimeout(()=>ki.focus(), 300);
  }
}
