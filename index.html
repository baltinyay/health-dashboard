<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B0E11">
<title>Koç · Sağlık Paneli</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22Ko%C3%A7%22,%22short_name%22:%22Ko%C3%A7%22,%22display%22:%22standalone%22,%22background_color%22:%22%230B0E11%22,%22theme_color%22:%22%230B0E11%22,%22icons%22:[]}">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#0B0E11; --bg2:#13181D; --card:#161C22; --card2:#1C242B;
  --line:#222B33; --line2:#2C3740;
  --txt:#E8EDF1; --txt2:#8B97A3; --txt3:#5A6570;
  --green:#2BD89A; --green-d:#1D9E75; --green-bg:rgba(43,216,154,.12);
  --blue:#4DA8FF; --amber:#F5B544; --coral:#FF7A59; --red:#FF5C5C;
  --radius:18px; --radius-sm:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg); color:var(--txt);
  min-height:100vh; overflow-x:hidden;
  background-image:radial-gradient(circle at 50% 0%, rgba(43,216,154,.06), transparent 60%);
}
.wrap{max-width:780px; margin:0 auto; padding:20px 16px 100px; position:relative}

/* HEADER */
.head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.brand{display:flex;align-items:center;gap:10px}
.brand-dot{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--green),var(--green-d));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#04120C}
.brand-name{font-size:17px;font-weight:700;letter-spacing:-.3px}
.brand-name span{color:var(--green)}
.head-greet{font-size:12px;color:var(--txt2);margin-top:1px}

/* DATE STRIP */
.datestrip{display:flex;align-items:center;gap:8px;margin-bottom:20px;position:relative}
.dnav{width:38px;height:38px;border-radius:11px;background:var(--card);border:1px solid var(--line);color:var(--txt2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;transition:.18s;user-select:none}
.dnav:active{transform:scale(.92);background:var(--card2)}
.dcenter{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:9px 16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:.18s}
.dcenter:active{transform:scale(.98)}
.dcenter-day{font-size:15px;font-weight:700;letter-spacing:-.2px}
.dcenter-sub{font-size:11px;color:var(--txt2)}
.ddots{display:flex;gap:4px}
.ddot{width:6px;height:6px;border-radius:50%}

/* CALENDAR POPUP */
.calwrap{position:absolute;top:46px;left:46px;right:46px;z-index:50;background:var(--card2);border:1px solid var(--line2);border-radius:var(--radius);padding:16px;opacity:0;transform:translateY(-8px) scale(.97);pointer-events:none;transition:.22s cubic-bezier(.2,.8,.2,1)}
.calwrap.open{opacity:1;transform:none;pointer-events:auto}
.calhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.caltitle{font-size:14px;font-weight:700}
.calnav{display:flex;gap:6px}
.calnav button{width:30px;height:30px;border-radius:9px;background:var(--card);border:1px solid var(--line);color:var(--txt2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.caldow{font-size:10px;color:var(--txt3);text-align:center;padding:4px 0;font-weight:600}
.calday{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;transition:.14s;position:relative;font-size:13px;font-weight:600}
.calday:active{transform:scale(.9)}
.calday.has{background:var(--card)}
.calday.sel{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.calday.today::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--green)}
.calday.other{opacity:.28}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 16px;border-radius:12px;background:var(--card);border:1px solid var(--line);color:var(--txt2);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.18s;flex-shrink:0;display:flex;align-items:center;gap:6px}
.tab.on{background:var(--green);border-color:var(--green);color:#04120C}
.tab svg{width:15px;height:15px}

/* PAGES */
.page{display:none;animation:slideup .35s cubic-bezier(.2,.8,.2,1)}
.page.on{display:block}
@keyframes slideup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* HERO METRIC */
.hero{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40%;right:-10%;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,var(--green-bg),transparent 70%)}
.hero-label{font-size:12px;color:var(--txt2);margin-bottom:6px;position:relative}
.hero-val{font-size:46px;font-weight:800;letter-spacing:-2px;line-height:1;position:relative}
.hero-unit{font-size:18px;color:var(--txt2);font-weight:600}
.hero-delta{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;margin-top:10px;padding:4px 10px;border-radius:8px;position:relative}
.hero-delta.down{background:var(--green-bg);color:var(--green)}
.hero-delta.up{background:rgba(255,92,92,.12);color:var(--red)}

/* STAT GRID */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px}
.stat-label{font-size:11px;color:var(--txt2);margin-bottom:5px}
.stat-val{font-size:21px;font-weight:700;letter-spacing:-.5px}
.stat-val .u{font-size:12px;color:var(--txt2);font-weight:500}
.stat-val.green{color:var(--green)}.stat-val.amber{color:var(--amber)}

/* CARD */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.ctitle{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:16px;display:flex;align-items:center;gap:8px;letter-spacing:-.2px}
.ctitle svg{width:16px;height:16px;color:var(--green)}

/* RINGS (macro) */
.rings{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.ring-item{display:flex;flex-direction:column;align-items:center;gap:8px}
.ring{position:relative;width:62px;height:62px}
.ring svg{transform:rotate(-90deg)}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.ring-name{font-size:11px;color:var(--txt2)}
.ring-val{font-size:12px;font-weight:600;color:var(--txt)}

/* YORUM */
.yorum{border-radius:var(--radius-sm);padding:14px 16px;font-size:13px;line-height:1.65;border-left:3px solid var(--amber);background:rgba(245,181,68,.08);color:#F5D89B}

/* CHART */
.chart-wrap{position:relative;width:100%;height:230px}

/* OGUN */
.ogun{background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;transition:.18s}
.ogun:active{transform:scale(.99)}
.ohead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.oname{font-size:14px;font-weight:700}
.okcal{font-size:13px;color:var(--green);font-weight:700}
.omacro{display:flex;gap:8px;margin-bottom:8px}
.opill{font-size:11px;padding:3px 9px;border-radius:7px;background:var(--card2);color:var(--txt2);font-weight:600}
.ofood{font-size:12px;color:var(--txt2);line-height:1.5}

/* ANT */
.exr{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--line)}
.exr:last-child{border:none}
.exr-name{font-size:14px;font-weight:600}
.exr-badge{font-size:12px;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:5px 11px;color:var(--txt2);font-weight:600}
.kard{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.kard:last-child{border:none}
.kard-ic{width:38px;height:38px;border-radius:11px;background:var(--green-bg);display:flex;align-items:center;justify-content:center;color:var(--green);flex-shrink:0}
.kard-ic svg{width:19px;height:19px}
.kard-name{font-size:14px;font-weight:600;flex:1}
.kard-meta{font-size:12px;color:var(--txt2)}

/* SUPP */
.supps{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.supp{display:flex;align-items:center;gap:11px;padding:13px 14px;background:var(--bg2);border:1px solid var(--line);border-radius:13px;cursor:pointer;transition:.16s}
.supp:active{transform:scale(.97)}
.supp.on{background:var(--green-bg);border-color:var(--green)}
.scheck{width:22px;height:22px;border-radius:7px;border:2px solid var(--line2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.16s}
.supp.on .scheck{background:var(--green);border-color:var(--green)}
.scheck svg{width:13px;height:13px;color:#04120C;opacity:0;transition:.16s}
.supp.on .scheck svg{opacity:1}
.sname{font-size:13px;font-weight:600}

/* LAB */
.labsum{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.labgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.labitem{background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:13px}
.labname{font-size:11px;color:var(--txt2);margin-bottom:5px}
.labval{font-size:18px;font-weight:700;letter-spacing:-.5px}
.labval.ok{color:var(--green)}.labval.lo{color:var(--amber)}.labval.hi{color:var(--red)}
.labref{font-size:10px;color:var(--txt3);margin-top:3px}

/* LOADING + EMPTY */
.loading{text-align:center;padding:50px 20px;color:var(--txt2);font-size:14px}
.spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--green);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--txt3);font-size:14px}
.empty svg{width:38px;height:38px;margin-bottom:10px;opacity:.4}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 230px);min-height:420px}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:4px 2px 16px;scrollbar-width:thin}
.msg{max-width:82%;padding:12px 15px;border-radius:16px;font-size:14px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word;animation:msgin .3s cubic-bezier(.2,.8,.2,1)}
@keyframes msgin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;background:var(--green);color:#04120C;border-bottom-right-radius:5px;font-weight:500}
.msg.koc{align-self:flex-start;background:var(--card);border:1px solid var(--line);color:var(--txt);border-bottom-left-radius:5px}
.msg.typing{align-self:flex-start;background:var(--card);border:1px solid var(--line);border-bottom-left-radius:5px;display:flex;gap:5px;padding:15px}
.msg.typing span{width:7px;height:7px;border-radius:50%;background:var(--txt3);animation:blink 1.2s infinite}
.msg.typing span:nth-child(2){animation-delay:.2s}
.msg.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
.chat-welcome{text-align:center;padding:30px 16px;color:var(--txt2)}
.chat-welcome-ic{width:48px;height:48px;border-radius:14px;background:var(--green-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--green)}
.chat-welcome-ic svg{width:24px;height:24px}
.chat-welcome h3{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:6px}
.chat-welcome p{font-size:13px;line-height:1.5}
.chat-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:16px}
.chip{padding:8px 13px;border-radius:11px;background:var(--card);border:1px solid var(--line);color:var(--txt2);font-size:12px;cursor:pointer;transition:.15s}
.chip:active{transform:scale(.96)}
.chip:hover{border-color:var(--green);color:var(--txt)}
.chat-input{display:flex;gap:9px;align-items:flex-end;padding-top:12px;border-top:1px solid var(--line)}
.chat-input textarea{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px;color:var(--txt);font-size:14px;font-family:inherit;resize:none;max-height:120px;line-height:1.4;outline:none;transition:.15s}
.chat-input textarea:focus{border-color:var(--green)}
.chat-send{width:44px;height:44px;border-radius:13px;background:var(--green);border:none;color:#04120C;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.chat-send:active{transform:scale(.92)}
.chat-send:disabled{opacity:.4;cursor:not-allowed}
.chat-send svg{width:19px;height:19px}

/* ANTRENMAN DEFTERİ */
.agrp{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden}
.agrph{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;transition:.15s}
.agrph.on{background:var(--green-bg)}
.agrpn{font-size:15px;font-weight:700;display:flex;align-items:center;gap:9px}
.agrpn svg{color:var(--green);width:18px;height:18px}
.agrpc{font-size:12px;color:var(--txt2);display:flex;align-items:center;gap:6px}
.aexs{display:none;padding:0 12px 10px}
.aexs.open{display:block}
.aex{padding:12px 8px;border-top:1px solid var(--line)}
.aexn{font-size:13px;font-weight:600;margin-bottom:9px}
.asets{display:flex;gap:8px;align-items:flex-end}
.asetbox{flex:1;display:flex;flex-direction:column;gap:4px}
.asetbox label{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.3px}
.asetbox input{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:10px;color:var(--txt);font-size:15px;font-weight:600;text-align:center;width:100%;font-family:inherit}
.asetbox input:focus{border-color:var(--green);outline:none}
.asetbox input.dolu{border-color:var(--green-d)}
.asaveb{width:100%;background:var(--green);color:#04120C;border:none;border-radius:var(--radius-sm);padding:15px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.asaveb:active{transform:scale(.98)}
.asaveb:disabled{opacity:.5}
.asaveb svg{width:18px;height:18px}
.atip-input{width:100%;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;color:var(--txt);font-size:14px;font-family:inherit;margin-bottom:12px}
.atip-input:focus{border-color:var(--green);outline:none}

/* KALORİ BÜTÇE GRAFİĞİ */
.kb-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px}
.kb-big{font-size:34px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.kb-slash{font-size:16px;color:var(--txt2);font-weight:600;letter-spacing:0}
.kb-pct{font-size:14px;font-weight:700;padding:5px 12px;border-radius:10px}
.kb-track{position:relative;height:16px;background:var(--bg);border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.kb-fill{position:absolute;left:0;top:0;height:100%;border-radius:10px;transition:width .7s cubic-bezier(.2,.8,.2,1)}
.kb-over{position:absolute;right:0;top:0;height:100%;background:repeating-linear-gradient(45deg,var(--red),var(--red) 6px,#c44 6px,#c44 12px);opacity:.9;border-radius:0 10px 10px 0;transition:width .7s cubic-bezier(.2,.8,.2,1)}
.kb-scale{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--txt3)}
.kb-durum{margin-top:14px;padding:13px 15px;border-radius:12px;border-left:3px solid}
.kb-durum-t{font-size:13px;font-weight:700;margin-bottom:4px}
.kb-durum-m{font-size:12.5px;line-height:1.55;color:var(--txt2)}
.kb-budget{display:flex;justify-content:space-between;margin-top:14px;gap:10px}
.kb-budget-item{flex:1;text-align:center;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px 6px}
.kb-budget-v{font-size:20px;font-weight:800;letter-spacing:-.5px}
.kb-budget-l{font-size:10px;color:var(--txt2);margin-top:3px}
</style>
</head>

  run:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13" cy="4" r="2"/><path d="M8 21l3-6 3 2 1 4M11 15l-2-5 4-2 2 3 3 1"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5L20 6"/></svg>',
  empty:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/></svg>',
  chat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>',
  send:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>',
  save:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>',
};

const TABS = [
  {id:'kocu', name:'Koç', ic:I.chat},
  {id:'ozet', name:'Özet', ic:I.chart},
  {id:'besl', name:'Beslenme', ic:I.food},
  {id:'ant', name:'Antrenman', ic:I.dumbbell},
  {id:'supp', name:'Supplement', ic:I.pill},
  {id:'lab', name:'Tahlil', ic:I.lab},
];

let selDate = new Date().toISOString().slice(0,10);
let curTab = 'ozet';
let cy = new Date().getFullYear(), cm = new Date().getMonth();
let calOpen = false;
let kiloChart = null;

const cache = { olcum:{}, ogun:{}, ant:{}, supp:{}, lab:[], kiloTrend:[], hedefler:[], loaded:false };

// Belirli bir güne ait kalori hedefini bul (o güne kadar olan en son hedef)
function gununHedefi(ds){
  const uygun = cache.hedefler
    .filter(h => h.baslangic_tarih <= ds)
    .sort((a,b)=> b.baslangic_tarih.localeCompare(a.baslangic_tarih));
  return uygun.length ? uygun[0].kalori : 1800; // varsayılan 1800
}

async function fetchData(){
  cache.olcum={}; cache.ogun={}; cache.ant={}; cache.supp={}; cache.lab=[]; cache.kiloTrend=[]; cache.hedefler=[];
  try{
    const [olcum, ogun, ant, supp, lab, hedefler] = await Promise.all([
      sb.from('gunluk_olcum').select('*'),
      sb.from('ogunler').select('*'),
      sb.from('antrenmanlar').select('*'),
      sb.from('supplementler').select('*'),
      sb.from('tahliller').select('*'),
      sb.from('hedefler').select('*'),
    ]);
    (olcum.data||[]).forEach(r=>cache.olcum[r.tarih]=r);
    (ogun.data||[]).forEach(r=>{ (cache.ogun[r.tarih]=cache.ogun[r.tarih]||[]).push(r); });
    (ant.data||[]).forEach(r=>cache.ant[r.tarih]=r);
    (supp.data||[]).forEach(r=>cache.supp[r.tarih]=r);
    cache.lab = (lab.data||[]).sort((a,b)=>(b.tarih||'').localeCompare(a.tarih||''));
    cache.kiloTrend = (olcum.data||[]).filter(r=>r.kilo).sort((a,b)=>a.tarih.localeCompare(b.tarih));
    cache.hedefler = hedefler.data || [];
  }catch(e){
    console.error(e);
  }
  cache.loaded = true;
}

async function loadAll(){
  await fetchData();
  buildTabs();
  render();
}

function buildTabs(){
  document.getElementById('tabs').innerHTML = TABS.map(t=>
    `<div class="tab${t.id===curTab?' on':''}" data-tab="${t.id}">${t.ic}${t.name}</div>`
  ).join('');
  document.querySelectorAll('.tab').forEach(el=>{
    el.onclick = ()=>{ curTab=el.dataset.tab; buildTabs(); render(); };
  });
}

function fmtDay(ds){ const [y,m,d]=ds.split('-'); return `${+d} ${MN[+m-1]}`; }
function fmtSub(ds){ const dt=new Date(ds); return `${DAYNAMES[dt.getDay()]} · ${ds.split('-')[0]}`; }

function updHeader(){
  const h = new Date().getHours();
  document.getElementById('greet').textContent = h<12?'Günaydın':h<18?'İyi günler':'İyi akşamlar';
  document.getElementById('dDay').textContent = fmtDay(selDate);
  document.getElementById('dSub').textContent = fmtSub(selDate);
  const o = cache.olcum[selDate], a = cache.ant[selDate];
  let dots = '';
  if(cache.ogun[selDate]||o) dots += '<div class="ddot" style="background:var(--green)"></div>';
  if(a) dots += '<div class="ddot" style="background:var(--blue)"></div>';
  document.getElementById('dDots').innerHTML = dots;
}

window.toggleCal = ()=>{ calOpen=!calOpen; document.getElementById('calWrap').classList.toggle('open',calOpen); if(calOpen) renderCal(); };
document.addEventListener('click',e=>{ if(calOpen&&!e.target.closest('.datestrip')){ calOpen=false; document.getElementById('calWrap').classList.remove('open'); }});
window.calMonth = (d)=>{ cm+=d; if(cm<0){cm=11;cy--;} if(cm>11){cm=0;cy++;} renderCal(); };

function renderCal(){
  document.getElementById('calTitle').textContent = MN[cm]+' '+cy;
  const g = document.getElementById('calGrid');
  g.innerHTML = DOW.map(d=>`<div class="caldow">${d}</div>`).join('');
  let sd = new Date(cy,cm,1).getDay(); sd = sd===0?6:sd-1;
  const dim = new Date(cy,cm+1,0).getDate();
  const today = new Date().toISOString().slice(0,10);
  for(let i=0;i<sd;i++){ const p=new Date(cy,cm,1-sd+i); g.innerHTML+=`<div class="calday other">${p.getDate()}</div>`; }
  for(let d=1;d<=dim;d++){
    const ds=`${cy}-${String(cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const has = cache.olcum[ds]||cache.ogun[ds]||cache.ant[ds];
    g.innerHTML+=`<div class="calday${has?' has':''}${ds===selDate?' sel':''}${ds===today?' today':''}" data-d="${ds}">${d}</div>`;
  }
  g.querySelectorAll('[data-d]').forEach(el=>{
    el.onclick=(e)=>{ e.stopPropagation(); selDate=el.dataset.d; calOpen=false; document.getElementById('calWrap').classList.remove('open'); render(); };
  });
}

window.shiftDay = (d)=>{ const dt=new Date(selDate); dt.setDate(dt.getDate()+d); selDate=dt.toISOString().slice(0,10); render(); };

function ring(pct,color,size=62){
  const r=26, c=2*Math.PI*r, off=c*(1-Math.min(1,pct/100));
  return `<svg width="${size}" height="${size}" viewBox="0 0 62 62">
    <circle cx="31" cy="31" r="${r}" fill="none" stroke="var(--line)" stroke-width="5"/>
    <circle cx="31" cy="31" r="${r}" fill="none" stroke="${color}" stroke-width="5" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .8s cubic-bezier(.2,.8,.2,1)"/>
  </svg>`;
}

function render(){
  updHeader();
  const p = document.getElementById('pages');
  if(!cache.loaded){ return; }
  // Tüm sekmelerde tarih şeridi görünür (Koç dahil) —
  // böylece hangi güne kayıt/silme yaptığın belli olur.
  document.querySelector('.datestrip').style.display = 'flex';
  if(curTab==='kocu'){ p.innerHTML = viewKocu(); bindChat(); }
  else if(curTab==='ozet') p.innerHTML = viewOzet();
  else if(curTab==='besl') p.innerHTML = viewBesl();
  else if(curTab==='ant'){ p.innerHTML = viewAnt(); bindAnt(); }
  else if(curTab==='supp'){ p.innerHTML = viewSupp(); bindSupp(); }
  else if(curTab==='lab') p.innerHTML = viewLab();
  if(curTab==='ozet' && cache.kiloTrend.length) setTimeout(drawKilo,50);
}

function totals(ds){
  const og = cache.ogun[ds]||[];
  return {
    kalori: og.reduce((s,o)=>s+(o.kcal||0),0),
    protein: og.reduce((s,o)=>s+(o.protein||0),0),
    karb: og.reduce((s,o)=>s+(o.karb||0),0),
    yag: og.reduce((s,o)=>s+(o.yag||0),0),
  };
}

function viewOzet(){
  const o = cache.olcum[selDate];
  const t = totals(selDate);
  const a = cache.ant[selDate];
  const antVar = a && Array.isArray(a.egzersizler) && a.egzersizler.length;
  const trend = cache.kiloTrend;
  // Son ölçüm: o güne ait varsa o, yoksa trenddeki en son ölçüm
  const sonOlcum = o || (trend.length ? trend[trend.length-1] : null);
  const olcumGuncel = !!o; // bu güne mi ait
  const hedefKcal = gununHedefi(selDate);

  let delta = 0;
  if(o && trend.length>1){
    const idx = trend.findIndex(r=>r.tarih===selDate);
    if(idx>0) delta = Math.round((o.kilo - trend[idx-1].kilo)*10)/10;
  }
  const macros = [
    ['Protein',t.protein,HEDEF.protein,'var(--green)'],
    ['Karb',t.karb,HEDEF.karb,'var(--blue)'],
    ['Yağ',t.yag,HEDEF.yag,'var(--amber)'],
    ['Kalori',t.kalori,hedefKcal,'var(--coral)'],
  ];

  // Kalori bütçesi mini-gösterge
  const alinan = t.kalori;
  const kalan = hedefKcal - alinan;
  const yuzde = Math.round(alinan/hedefKcal*100);
  let bRenk = 'var(--blue)';
  if(yuzde>=70 && yuzde<=100) bRenk='var(--green)';
  else if(yuzde>100 && yuzde<=115) bRenk='var(--amber)';
  else if(yuzde>115) bRenk='var(--red)';

  return `<div class="page on">
    ${sonOlcum ? `<div class="hero">
      <div class="hero-label">${olcumGuncel?'Ağırlık':'Son ölçüm'} ${olcumGuncel?'':`· ${fmtDay(sonOlcum.tarih)}`}</div>
      <div class="hero-val">${sonOlcum.kilo}<span class="hero-unit"> kg</span></div>
      ${olcumGuncel&&delta!==0?`<div class="hero-delta ${delta<0?'down':'up'}">${delta<0?'↓':'↑'} ${Math.abs(delta)} kg · önceki ölçüm</div>`:''}
    </div>`:''}

    <div class="card">
      <div class="ctitle">${I.chart} Kalori Bütçesi <span style="margin-left:auto;font-size:11px;color:var(--txt2);font-weight:500">${alinan} / ${hedefKcal} kcal</span></div>
      <div class="kb-track"><div class="kb-fill" style="width:${Math.min(100,yuzde)}%;background:${bRenk}"></div>${yuzde>100?`<div class="kb-over" style="width:${Math.min(100,yuzde-100)}%"></div>`:''}</div>
      <div class="kb-budget">
        <div class="kb-budget-item"><div class="kb-budget-v" style="color:${bRenk}">${alinan}</div><div class="kb-budget-l">tükettim</div></div>
        <div class="kb-budget-item"><div class="kb-budget-v" style="color:${kalan>=0?'var(--green)':'var(--red)'}">${kalan>=0?kalan:'+'+Math.abs(kalan)}</div><div class="kb-budget-l">${kalan>=0?'kalan hakkım':'aşım'}</div></div>
        <div class="kb-budget-item"><div class="kb-budget-v">%${yuzde}</div><div class="kb-budget-l">doluluk</div></div>
      </div>
    </div>

    <div class="card">
      <div class="ctitle">${I.chart} Makro durumu</div>
      <div class="rings">
        ${macros.map(([n,v,m,c])=>{const pct=Math.min(100,Math.round(v/m*100));return `<div class="ring-item"><div class="ring">${ring(pct,c)}<div class="ring-pct" style="color:${c}">${pct}%</div></div><div class="ring-name">${n}</div><div class="ring-val">${v}</div></div>`;}).join('')}
      </div>
    </div>
    ${trend.length>1?`<div class="card"><div class="ctitle">${I.chart} Kilo trendi</div><div class="chart-wrap"><canvas id="kiloChart"></canvas></div></div>`:''}
    ${sonOlcum&&sonOlcum.kas_kg?`<div class="stats"><div class="stat"><div class="stat-label">Kas kütlesi</div><div class="stat-val">${sonOlcum.kas_kg}<span class="u">kg</span></div></div><div class="stat"><div class="stat-label">Su oranı</div><div class="stat-val">%${sonOlcum.su_orani||'—'}</div></div><div class="stat"><div class="stat-label">Yağ oranı</div><div class="stat-val">%${sonOlcum.yag_orani||'—'}</div></div></div>`:''}
    ${ozetAntrenman()}
    ${ozetOgunler()}
  </div>`;
}

function ozetAntrenman(){
  const a = cache.ant[selDate];
  if(!a || !Array.isArray(a.egzersizler) || !a.egzersizler.length) return '';
  const egz = a.egzersizler;
  return `<div class="card">
    <div class="ctitle">${I.dumbbell} Antrenman <span style="margin-left:auto;font-size:11px;color:var(--txt2);font-weight:500">${a.tip||''} · ${egz.length} hareket</span></div>
    ${egz.map(e=>{
      const detay = e.detay || [e.kg!=null?e.kg+' kg':'', (e.set!=null||e.tekrar!=null)?`${e.set||''}×${e.tekrar||''}`:''].filter(Boolean).join(' · ');
      return `<div class="exr"><div class="exr-name">${e.ad||''}</div><div class="exr-badge">${detay||'—'}</div></div>`;
    }).join('')}
    ${Array.isArray(a.kardiyo)&&a.kardiyo.length?a.kardiyo.map(k=>`<div class="exr"><div class="exr-name">${I.run} ${k.ad||'Kardiyo'}</div><div class="exr-badge">${k.sure?k.sure+' dk':''}${k.kcal?' · '+k.kcal+' kcal':''}</div></div>`).join(''):''}
  </div>`;
}

function ozetOgunler(){
  const og = cache.ogun[selDate]||[];
  if(!og.length) return '';
  const t = totals(selDate);
  return `<div class="card">
    <div class="ctitle">${I.food} Öğünler <span style="margin-left:auto;font-size:11px;color:var(--txt2);font-weight:500">${og.length} öğün · ${t.kalori} kcal</span></div>
    ${og.map(o=>`<div class="osog-row" style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)">
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${o.ogun||'Öğün'}</div>${o.yiyecekler?`<div style="font-size:11px;color:var(--txt2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.yiyecekler}</div>`:''}</div>
      <div style="font-size:13px;color:var(--green);font-weight:700;margin-left:10px;flex-shrink:0">${o.kcal||0} kcal</div>
    </div>`).join('')}
  </div>`;
}

function drawKilo(){
  const el = document.getElementById('kiloChart');
  if(!el) return;
  if(kiloChart) kiloChart.destroy();
  const data = cache.kiloTrend;
  const vals = data.map(r=>r.kilo);
  const mn = Math.floor(Math.min(...vals)-1), mx = Math.ceil(Math.max(...vals)+1);
  kiloChart = new Chart(el,{
    type:'line',
    data:{ labels:data.map(r=>{const[,m,d]=r.tarih.split('-');return d+'/'+m;}),
      datasets:[{data:vals,borderColor:'#2BD89A',borderWidth:2.5,tension:.4,fill:true,
        backgroundColor:(c)=>{const g=c.chart.ctx.createLinearGradient(0,0,0,230);g.addColorStop(0,'rgba(43,216,154,.25)');g.addColorStop(1,'rgba(43,216,154,0)');return g;},
        pointBackgroundColor:'#2BD89A',pointBorderColor:'#0B0E11',pointBorderWidth:2,pointRadius:5,pointHoverRadius:7}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1C242B',borderColor:'#2C3740',borderWidth:1,titleColor:'#8B97A3',bodyColor:'#E8EDF1',padding:10,displayColors:false,callbacks:{label:c=>c.parsed.y+' kg'}}},
      scales:{y:{min:mn,max:mx,ticks:{color:'#5A6570',font:{size:11},callback:v=>v+' kg'},grid:{color:'rgba(255,255,255,.04)'}},x:{ticks:{color:'#5A6570',font:{size:11}},grid:{display:false}}}}
  });
}

function viewBesl(){
  const og = cache.ogun[selDate]||[];
  const t = totals(selDate);
  if(!og.length) return `<div class="page on"><div class="empty">${I.empty}<div>Bu gün öğün kaydı yok.</div></div></div>`;

  const hedef = gununHedefi(selDate);
  const alinan = t.kalori;
  const yuzde = Math.round(alinan/hedef*100);
  const kalan = hedef - alinan;
  const asim = alinan - hedef;

  // Durum analizi + renk
  let durumRenk, durumBaslik, durumMetin, barRenk;
  if(yuzde < 70){
    durumRenk='var(--blue)'; barRenk='var(--blue)';
    durumBaslik='Hedefin altındasın';
    durumMetin=`${kalan} kcal daha alabilirsin. Gün bitmeden öğünlerini tamamlamayı unutma.`;
  } else if(yuzde <= 100){
    durumRenk='var(--green)'; barRenk='var(--green)';
    durumBaslik='Harika gidiyorsun';
    durumMetin=kalan>0 ? `Hedefine çok yakınsın, ${kalan} kcal bütçen kaldı.` : `Tam hedefindesin! Mükemmel denge.`;
  } else if(yuzde <= 115){
    durumRenk='var(--amber)'; barRenk='var(--amber)';
    durumBaslik='Hedefi biraz aştın';
    durumMetin=`${asim} kcal fazla aldın. Yarın biraz daha dikkatli olabilir veya bugün hareket ekleyebilirsin.`;
  } else {
    durumRenk='var(--red)'; barRenk='var(--red)';
    durumBaslik='Hedefi belirgin aştın';
    durumMetin=`${asim} kcal fazladasın (%${yuzde-100} aşım). Akşam hafif tutmak veya kardiyo eklemek dengeyi toparlar.`;
  }

  const barDoluluk = Math.min(100, yuzde);
  const asimBar = yuzde>100 ? Math.min(100, yuzde-100) : 0;

  return `<div class="page on">
    <div class="card kalori-card">
      <div class="ctitle">${I.chart} Günlük Kalori Bütçesi</div>
      <div class="kb-head">
        <div class="kb-big" style="color:${durumRenk}">${alinan}<span class="kb-slash">/ ${hedef}</span></div>
        <div class="kb-pct" style="background:${durumRenk}1f;color:${durumRenk}">%${yuzde}</div>
      </div>
      <div class="kb-track">
        <div class="kb-fill" style="width:${barDoluluk}%;background:${barRenk}"></div>
        ${asimBar>0?`<div class="kb-over" style="width:${asimBar}%"></div>`:''}
      </div>
      <div class="kb-scale"><span>0</span><span>${Math.round(hedef/2)}</span><span>${hedef}</span></div>
      <div class="kb-durum" style="border-left-color:${durumRenk};background:${durumRenk}14">
        <div class="kb-durum-t" style="color:${durumRenk}">${durumBaslik}</div>
        <div class="kb-durum-m">${durumMetin}</div>
      </div>
    </div>

    <div class="stats" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat"><div class="stat-label">Kalori</div><div class="stat-val">${t.kalori}</div></div>
      <div class="stat"><div class="stat-label">Protein</div><div class="stat-val green">${t.protein}<span class="u">g</span></div></div>
      <div class="stat"><div class="stat-label">Karb</div><div class="stat-val">${t.karb}<span class="u">g</span></div></div>
      <div class="stat"><div class="stat-label">Yağ</div><div class="stat-val">${t.yag}<span class="u">g</span></div></div>
    </div>
    <div class="card"><div class="ctitle">${I.food} Öğünler</div>
      ${og.map(o=>`<div class="ogun"><div class="ohead"><div class="oname">${o.ogun||'Öğün'}</div><div class="okcal">${o.kcal||0} kcal</div></div><div class="omacro"><span class="opill">P ${o.protein||0}g</span><span class="opill">K ${o.karb||0}g</span><span class="opill">Y ${o.yag||0}g</span></div>${o.yiyecekler?`<div class="ofood">${o.yiyecekler}</div>`:''}</div>`).join('')}
    </div>
  </div>`;
}

function viewAnt(){
  // Seçili günün kayıtlı verisini al, hareketlere göre eşle
  const a = cache.ant[selDate];
  const kayitli = {};
  if(a && Array.isArray(a.egzersizler)){
    a.egzersizler.forEach(e=>{ if(e.ad) kayitli[e.ad] = e; });
  }
  const tipDeger = a && a.tip ? a.tip : '';

  let html = `<div class="page on">
    <input class="atip-input" id="antTip" placeholder="Antrenman adı (örn. Push, Göğüs günü)" value="${tipDeger.replace(/"/g,'&quot;')}">`;

  KAS_GRUPLARI.forEach((grup,gi)=>{
    const doluSayisi = grup.hareketler.filter(h=>kayitli[h]).length;
    html += `<div class="agrp">
      <div class="agrph${doluSayisi?' on':''}" data-grup="${gi}">
        <div class="agrpn">${I.dumbbell} ${grup.ad}</div>
        <div class="agrpc">${grup.hareketler.length} hareket${doluSayisi?` · ${doluSayisi} dolu`:''} <span class="acaret">▸</span></div>
      </div>
      <div class="aexs${doluSayisi?' open':''}">`;
    grup.hareketler.forEach(h=>{
      const k = kayitli[h] || {};
      html += `<div class="aex">
        <div class="aexn">${h}</div>
        <div class="asets">
          <div class="asetbox"><label>Ağırlık (kg)</label><input type="text" inputmode="decimal" data-h="${h}" data-f="kg" value="${k.kg??''}" placeholder="0"></div>
          <div class="asetbox"><label>Tekrar</label><input type="text" inputmode="numeric" data-h="${h}" data-f="tekrar" value="${k.tekrar??''}" placeholder="0"></div>
          <div class="asetbox"><label>Set</label><input type="text" inputmode="numeric" data-h="${h}" data-f="set" value="${k.set??''}" placeholder="0"></div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });

  html += `<button class="asaveb" id="antSave">${I.save} Antrenmanı Kaydet</button></div>`;
  return html;
}

function bindAnt(){
  // Grup aç/kapa
  document.querySelectorAll('.agrph').forEach(h=>{
    h.onclick = ()=>{
      const exs = h.nextElementSibling;
      const acik = exs.classList.toggle('open');
      h.classList.toggle('on', acik || exs.querySelector('input.dolu'));
    };
  });
  // Dolu kutuları işaretle
  document.querySelectorAll('.asetbox input').forEach(inp=>{
    if(inp.value.trim()) inp.classList.add('dolu');
    inp.addEventListener('input', ()=>{ inp.classList.toggle('dolu', inp.value.trim()!==''); });
  });
  // Kaydet
  const btn = document.getElementById('antSave');
  if(btn) btn.onclick = antKaydet;
}

async function antKaydet(){
  const btn = document.getElementById('antSave');
  btn.disabled = true; btn.textContent = 'Kaydediliyor…';

  const tip = document.getElementById('antTip').value.trim() || 'Antrenman';
  const toplam = {};
  document.querySelectorAll('.asetbox input').forEach(inp=>{
    const h = inp.dataset.h, f = inp.dataset.f, v = inp.value.trim().replace(',','.');
    if(v==='') return;
    toplam[h] = toplam[h] || { ad:h };
    toplam[h][f] = f==='kg' ? parseFloat(v) : parseInt(v,10);
  });
  const egzersizler = Object.values(toplam).map(e=>{
    const parca = [];
    if(e.kg!=null && !isNaN(e.kg)) parca.push(e.kg+'kg');
    if(e.set!=null && !isNaN(e.set)) parca.push(e.set+'x'+(e.tekrar??''));
    else if(e.tekrar!=null && !isNaN(e.tekrar)) parca.push(e.tekrar+' tekrar');
    return { ad:e.ad, kg:e.kg, tekrar:e.tekrar, set:e.set, detay:parca.join(' · ') };
  });

  if(!egzersizler.length){
    btn.disabled=false; btn.innerHTML = `${I.save} Antrenmanı Kaydet`;
    alert('En az bir harekete değer gir.');
    return;
  }

  try{
    // upsert: aynı güne tek antrenman satırı
    const { error } = await sb.from('antrenmanlar')
      .upsert({ tarih:selDate, tip, egzersizler, kardiyo: (cache.ant[selDate]?.kardiyo)||[] }, { onConflict:'tarih' });
    if(error) throw error;
    await fetchData();
    btn.innerHTML = `${I.check} Kaydedildi!`;
    setTimeout(()=>{ render(); }, 700);
  }catch(e){
    btn.disabled=false; btn.innerHTML = `${I.save} Antrenmanı Kaydet`;
    alert('Kayıt hatası: '+(e.message||e));
  }
}

function viewSupp(){
  const rec = cache.supp[selDate];
  const checked = rec && rec.alinanlar ? rec.alinanlar : [];
  return `<div class="page on"><div class="card"><div class="ctitle">${I.pill} Günlük supplementler</div>
    <div class="supps">${SUPPS.map(s=>`<div class="supp${checked.includes(s)?' on':''}" data-s="${s}"><div class="scheck">${I.check}</div><div class="sname">${s}</div></div>`).join('')}</div>
  </div></div>`;
}
let suppLocal = {};
function bindSupp(){
  document.querySelectorAll('.supp').forEach(el=>{
    el.onclick=()=>{ el.classList.toggle('on'); };
  });
}

function viewLab(){
  if(!cache.lab.length) return `<div class="page on"><div class="empty">${I.empty}<div>Henüz tahlil kaydı yok.</div></div></div>`;
  const t = cache.lab[0];
  const deg = t.degerler||[];
  const anormal = deg.filter(d=>(d.durum||d[3])&&(d.durum||d[3])!=='ok').length;
  return `<div class="page on">
    <div class="labsum">
      <div class="stat"><div class="stat-label">Parametre</div><div class="stat-val">${deg.length}</div></div>
      <div class="stat"><div class="stat-label">Normal</div><div class="stat-val green">${deg.length-anormal}</div></div>
      <div class="stat"><div class="stat-label">Dikkat</div><div class="stat-val amber">${anormal}</div></div>
    </div>
    <div class="card"><div class="ctitle">${I.lab} ${t.baslik||'Tahlil'} · ${t.tarih||''}</div>
      <div class="labgrid">${deg.map(d=>{const ad=d.ad||d[0],val=d.deger||d[1],ref=d.referans||d[2],dur=d.durum||d[3]||'ok';return `<div class="labitem"><div class="labname">${ad}</div><div class="labval ${dur}">${val}</div><div class="labref">ref: ${ref}</div></div>`;}).join('')}</div>
      ${t.not_metni?`<div class="yorum" style="margin-top:14px">${t.not_metni}</div>`:''}
    </div>
  </div>`;
}

// ===== KOÇ CHAT =====
let chatGecmis = [];

function viewKocu(){
  const bos = chatGecmis.length === 0;
  return `<div class="page on"><div class="chat-wrap">
    <div class="chat-msgs" id="chatMsgs">
      ${bos ? `<div class="chat-welcome">
        <div class="chat-welcome-ic">${I.chat}</div>
        <h3>Koçunla konuş</h3>
        <p>Ne yediğini yaz, makroları hesaplayayım.<br>Antrenman geçmişini sor, planlayalım.</p>
        <div class="chat-chips">
          <div class="chip" data-chip="Bugün öğlen 4 yumurta, 5 yemek kaşığı yulaf yedim. Makroları nedir?">Öğün analizi</div>
          <div class="chip" data-chip="Bugün kol günü. İyi bir biceps ve triceps antrenmanı öner.">Antrenman önerisi</div>
          <div class="chip" data-chip="Yağ yakarken kas korumak için günlük ne kadar protein almalıyım? 94 kiloyum.">Protein hedefi</div>
        </div>
      </div>` : chatGecmis.map(m=>`<div class="msg ${m.rol==='kullanici'?'user':'koc'}">${escapeHtml(m.metin)}</div>`).join('')}
    </div>
    <div class="chat-input">
      <textarea id="chatInput" rows="1" placeholder="Koçuna yaz…"></textarea>
      <button class="chat-send" id="chatSend">${I.send}</button>
    </div>
  </div></div>`;
}

function escapeHtml(s){ return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function bindChat(){
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSend');
  if(!input) return;

  // Otomatik yükseklik
  input.addEventListener('input', ()=>{ input.style.height='auto'; input.style.height=Math.min(120,input.scrollHeight)+'px'; });
  // Enter ile gönder (Shift+Enter satır atlar)
  input.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); gonder(); } });
  sendBtn.onclick = gonder;
  // Hazır sorular
  document.querySelectorAll('.chip').forEach(c=>{
    c.onclick = ()=>{ input.value=c.dataset.chip; gonder(); };
  });
  scrollChat();
}

function scrollChat(){ const m=document.getElementById('chatMsgs'); if(m) m.scrollTop=m.scrollHeight; }

async function gonder(){
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSend');
  const text = input.value.trim();
  if(!text) return;

  chatGecmis.push({rol:'kullanici', metin:text});
  input.value=''; input.style.height='auto';
  sendBtn.disabled = true;

  // Mesajları yeniden çiz + yazıyor göstergesi
  const msgs = document.getElementById('chatMsgs');
  msgs.innerHTML = chatGecmis.map(m=>`<div class="msg ${m.rol==='kullanici'?'user':'koc'}">${escapeHtml(m.metin)}</div>`).join('')
    + '<div class="msg typing" id="typing"><span></span><span></span><span></span></div>';
  scrollChat();

  try{
    const res = await fetch('/.netlify/functions/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ mesaj:text, tarih: selDate, gecmis: chatGecmis.slice(0,-1) }),
    });
    const data = await res.json();
    let cevap;
    if(data.cevap){
      cevap = data.cevap;
      // Kayıt yapıldıysa tüm veriyi Supabase'den taze çek —
      // böylece Özet/Beslenme/Antrenman sekmeleri anında güncel olur.
      if(data.saved){ await fetchData(); }
    } else {
      cevap = 'Hata detayı: ' + JSON.stringify(data.detay || data.error || data).slice(0, 500);
    }
    chatGecmis.push({rol:'koc', metin:cevap});
  }catch(e){
    chatGecmis.push({rol:'koc', metin:'Bağlantı hatası: '+e.message});
  }

  document.getElementById('chatMsgs').innerHTML = chatGecmis.map(m=>`<div class="msg ${m.rol==='kullanici'?'user':'koc'}">${escapeHtml(m.metin)}</div>`).join('');
  sendBtn.disabled = false;
  scrollChat();
}

loadAll();
</script>
